      # ── 24h SoC-Prognose (ApexCharts) ────────────────────────────────
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: 24 h SoC-Prognose
            icon: mdi:chart-line

          - type: glance
            show_name: true
            show_state: true
            show_icon: true
            columns: 4
            entities:
              - entity: sensor.e3dc_maestro_forecast_soc_trajektorie_24h
                name: Trajektorie
                icon: mdi:chart-line
              - entity: sensor.e3dc_maestro_morgen_pv_prognose
                name: PV morgen
              - entity: sensor.e3dc_maestro_vorausschauendes_ladeziel
                name: Ladeziel
              - entity: sensor.e3dc_maestro_morgen_energiedefizit
                name: Defizit

          - type: custom:apexcharts-card
            chart_type: line
            graph_span: 24h
            span:
              start: hour
              offset: +1h
            header:
              title: Prognose SoC nächste 24 h
              show: true
              show_states: true
              colorize_states: true
            apex_config:
              chart:
                height: 240
              yaxis:
                min: 0
                max: 100
              xaxis:
                type: datetime
                labels:
                  datetimeUTC: false
                  format: HH:mm
            series:
              - entity: sensor.e3dc_maestro_forecast_soc_trajektorie_24h
                name: SoC-Prognose
                unit: "%"
                data_generator: |
                  return entity.attributes.trajectory_points || [];

      # ── Diagnose-Sensoren ────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Diagnose-Sensoren
            icon: mdi:numeric

          - type: entities
            entities:
              - entity: sensor.e3dc_maestro_aktives_lade_limit
                name: Soll-Lade-Limit
              - entity: sensor.e3dc_maestro_gesendetes_lade_limit
                name: Gesendetes Lade-Limit
              - entity: sensor.e3dc_maestro_aktives_entlade_limit
                name: Soll-Entlade-Limit
              - entity: sensor.e3dc_maestro_gesendetes_entlade_limit
                name: Gesendetes Entlade-Limit
              - entity: sensor.e3dc_maestro_notstromreserve_aktuell
                name: Notstromreserve (aktuell, %)
              - entity: sensor.e3dc_maestro_saisonales_ladeende_uhrzeit
                name: Saisonales Ladeende (Uhrzeit)
              - entity: sensor.e3dc_maestro_abregelung_verhindert_heute
                name: Einspeiselimit gesichert (kWh heute)

      # ── Debug ────────────────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Debug
            icon: mdi:bug-outline

          - type: entities
            entities:
              - entity: switch.e3dc_maestro_debug_logging
                name: Debug-Logging
              - entity: sensor.e3dc_maestro_debug_log
                name: Debug-Log

      # ── Phasen-Verlauf 48 h ──────────────────────────────────────────
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Phasen-Verlauf 48 h
            icon: mdi:chart-timeline

          - type: history-graph
            hours_to_show: 48
            refresh_interval: 60
            entities:
              - entity: sensor.e3dc_maestro_regelphase
                name: Phase
              - entity: sensor.e3dc_maestro_ziel_ladeleistung
                name: Ziel-Ladeleistung
              - entity: sensor.e3dc_maestro_ziel_soc
                name: Ziel-SoC

  # ========================================================================
  # TAB 9: AUTO-OPTIMIERUNG
  # ========================================================================
  - title: Auto-Optimierung
    icon: mdi:brain
    path: auto
    type: sections
    max_columns: 2
    sections:

      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Auto-Optimierung
            icon: mdi:brain

          - type: markdown
            content: |
              **Tägliche automatische Strategie-Optimierung** —
              Maestro testet ~210 Parameter-Kombinationen für Morning-Cap
              und Schonladung und wählt die Variante mit dem besten Score.

      - type: grid
        cards:
          - type: heading
            heading: Steuerung
            icon: mdi:tune-vertical

          - type: entities
            entities:
              - entity: switch.e3dc_maestro_auto_optimierung
                name: Auto-Optimierung aktiv
              - entity: select.e3dc_maestro_auto_optimierung_ziel
                name: Optimierungsziel
              - entity: sensor.e3dc_maestro_auto_aktive_strategie
                name: Aktive Strategie
              - entity: sensor.e3dc_maestro_auto_geschatzte_einsparung
                name: Geschätzte Einsparung
              - type: button
                name: "Hilfe Auto-Optimierung"
                icon: mdi:help-circle-outline
                tap_action:
                  action: navigate
                  navigation_path: /e3dc-maestro-modern/help-auto

      - type: grid
        cards:
          - type: heading
            heading: Was wurde optimiert?
            icon: mdi:magnify

          - type: markdown
            content: >
              {% set s = 'sensor.e3dc_maestro_auto_aktive_strategie' %}
              {% set r = state_attr(s, 'overrides') %}
              {% set fb = state_attr(s, 'fallback') %}
              {% set fr = state_attr(s, 'fallback_reason') %}
              {% set last = state_attr(s, 'last_run') %}
              {% set grid = state_attr(s, 'grid_size') %}
              {% set obj = state_attr(s, 'objective') %}
              {% set ts = last | as_timestamp | timestamp_custom('%d.%m. %H:%M') if last else '—' %}
              {% if fb %}
              **⚠️ Fallback aktiv** — manueller Modus.
              {% if fr %}_Grund:_ `{{ fr }}`{% endif %}
              {% elif not last %}
              _Noch keine Auto-Optimierung gelaufen_ (läuft kurz nach
              Mitternacht, benötigt ≥ 7 Tage Historie).
              {% elif not r %}
              ✅ **Baseline ist bereits optimal** — keine Override nötig.
              Der Optimizer hat **{{ grid }} Kombinationen** für Ziel
              `{{ obj }}` durchgerechnet (letzter Lauf: {{ ts }}).
              {% else %}
              **Ziel:** `{{ obj }}` · **{{ grid }} Kombinationen** ausgewertet
              · **Horizont {{ state_attr(s,'horizon_h') or 24 }} h**
              · letzter Lauf: {{ ts }}


              ### Geänderte Parameter (Override)

              | Parameter | Override | Standard-Empfehlung |
              |---|---|---|
              | Morning-Cap aktiv | `{{ r.morning_cap_enabled }}` | on |
              | Morning-Cap SoC | **{{ r.morning_cap_soc }} %** | 40 % |
              | Morning-Cap bis (lokal) | **{{ r.morning_cap_until_h }} h** | 10 h |
              | Schonladung aktiv | `{{ r.gentle_charge_enabled }}` | on |
              | Schonlade-Faktor | **{{ r.gentle_charge_factor }}** | 0.35 |
              {% endif %}

      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Live-Vergleich Override vs. Basis
            icon: mdi:scale-balance

          - type: entities
            state_color: false
            entities:
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: estimated_savings_eur
                name: Geschätzte Einsparung (Gesamt)
                suffix: " € / Horizont"
                icon: mdi:piggy-bank
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: estimated_savings_pct
                name: Score-Verbesserung
                suffix: " %"
                icon: mdi:trending-up
              - type: divider
              - type: section
                label: Energie-Deltas (Override − Basis, Gesamt)
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: delta_grid_draw_kwh
                name: Δ Netzbezug
                suffix: " kWh"
                icon: mdi:transmission-tower-import
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: delta_grid_feed_in_kwh
                name: Δ Netzeinspeisung
                suffix: " kWh"
                icon: mdi:transmission-tower-export
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: delta_curtailed_kwh
                name: Δ PV-Curtailment
                suffix: " kWh"
                icon: mdi:solar-power-variant
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: delta_self_sufficiency
                name: Δ Autarkie
                icon: mdi:home-battery
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: delta_min_soc
                name: Δ minimaler SoC
                suffix: " %"
                icon: mdi:battery-low
              - type: divider
              - type: section
                label: Aufschlüsselung der Einsparung
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: savings_from_less_grid_draw_eur
                name: Weniger Netzbezug × Kaufpreis
                suffix: " €"
                icon: mdi:cash-minus
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: savings_from_more_feed_in_eur
                name: Mehr Einspeisung × Vergütung
                suffix: " €"
                icon: mdi:cash-plus
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: tariff_buy_price_eur_kwh
                name: Verwendeter Kaufpreis
                suffix: " €/kWh"
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: tariff_feed_in_price_eur_kwh
                name: Verwendeter Einspeisepreis
                suffix: " €/kWh"

      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Forecast-Werte im Detail
            icon: mdi:chart-bar

          - type: markdown
            content: |
              {% set s = 'sensor.e3dc_maestro_auto_aktive_strategie' %}
              {% set h = state_attr(s, 'horizon_h') or 24 %}
              {% if h == 48 %}
              **48-h-Prognose: heute + morgen**

              **Alle kWh- und €-Werte unten sind Gesamtwerte für beide Tage** – sie sind keine Tageswerte.
              {% else %}
              **24-h-Prognose: heute**

              Alle kWh- und €-Werte unten sind Gesamtwerte für diesen einen Forecast-Tag.
              {% endif %}

          - type: entities
            entities:
              - type: section
                label: Override-Strategie (Gesamt über Forecast-Zeitraum)
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: sim_grid_draw_kwh
                name: Netzbezug (Gesamt)
                suffix: " kWh"
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: sim_grid_feed_in_kwh
                name: Einspeisung (Gesamt)
                suffix: " kWh"
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: sim_curtailed_kwh
                name: PV-Curtailment (Gesamt)
                suffix: " kWh"
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: sim_self_sufficiency
                name: Autarkiegrad
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: sim_min_soc
                name: Min. SoC
                suffix: " %"
              - type: divider
              - type: section
                label: Basis-Strategie ohne Auto (Gesamt über Forecast-Zeitraum)
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: baseline_grid_draw_kwh
                name: Netzbezug (Gesamt)
                suffix: " kWh"
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: baseline_grid_feed_in_kwh
                name: Einspeisung (Gesamt)
                suffix: " kWh"
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: baseline_curtailed_kwh
                name: PV-Curtailment (Gesamt)
                suffix: " kWh"
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: baseline_self_sufficiency
                name: Autarkiegrad
              - type: attribute
                entity: sensor.e3dc_maestro_auto_aktive_strategie
                attribute: baseline_min_soc
                name: Min. SoC
                suffix: " %"

  # ========================================================================
  # TAB 10: AKKU & PV ADVISOR
  # ========================================================================
  - title: Akku & PV Advisor
    icon: mdi:chart-timeline-variant-shimmer
    path: sizing-advisor
    type: sections
    max_columns: 3
    sections:

      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Akku & PV Sizing Advisor
            icon: mdi:chart-timeline-variant-shimmer

          - type: markdown
            content: >
              Historische Simulation — wie viel Netzbezug könntest du
              durch eine zusätzliche Batterie oder PV-Erweiterung einsparen?

          - type: tile
            entity: sensor.e3dc_maestro_advisor_status
            name: Status
            icon: mdi:chart-timeline-variant-shimmer
            color: blue

          - type: tile
            entity: button.e3dc_maestro_sizing_analyse_starten
            name: Analyse starten
            icon: mdi:play-circle-outline
            color: green
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.e3dc_maestro_sizing_analyse_starten

          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.e3dc_maestro_advisor_wr_upgrade_empfohlen
                state: "on"
            card:
              type: tile
              entity: binary_sensor.e3dc_maestro_advisor_wr_upgrade_empfohlen
              name: WR-Upgrade empfohlen
              icon: mdi:swap-horizontal-bold
              color: orange

      # ── Szenario-Slider ──────────────────────────────────────────────
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Szenario manuell einstellen
            icon: mdi:tune

          - type: entities
            entities:
              - entity: number.e3dc_maestro_advisor_hypothetische_batteriekapazitat
                name: Akku-Kapazität (+kWh)
              - entity: number.e3dc_maestro_advisor_hypothetische_pv_erweiterung
                name: PV-Erweiterung (+kWp)

      # ── Investitionskosten ──────────────────────────────────────────
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Investitionskosten
            icon: mdi:cash-multiple

          - type: entities
            entities:
              - entity: number.e3dc_maestro_advisor_preis_akku_eur_kwh
                name: Akku-Preis €/kWh
              - entity: number.e3dc_maestro_advisor_preis_pv_eur_kwp
                name: PV-Preis €/kWp
              - entity: number.e3dc_maestro_advisor_preis_wr_upgrade_eur
                name: WR-Upgrade €
              - entity: number.e3dc_maestro_advisor_zusatzkosten_eur_montage_nebenkosten
                name: Zusatzkosten € (Montage)

      # ── Szenario-KPIs ────────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Szenario-KPIs
            icon: mdi:gauge

          - type: tile
            entity: sensor.e3dc_maestro_advisor_autarkie_szenario
            name: Autarkie
            icon: mdi:solar-panel
            color: green

          - type: tile
            entity: sensor.e3dc_maestro_advisor_vermiedener_netzbezug_jahr
            name: Verm. Netzbezug
            icon: mdi:transmission-tower-off
            color: blue

          - type: tile
            entity: sensor.e3dc_maestro_advisor_ersparnis_jahr
            name: Ersparnis/Jahr
            icon: mdi:piggy-bank-outline
            color: amber

      - type: grid
        cards:
          - type: heading
            heading: Wirtschaftlichkeit
            icon: mdi:calculator

          - type: tile
            entity: sensor.e3dc_maestro_advisor_investition
            name: Investition
            icon: mdi:cash-multiple

          - type: tile
            entity: sensor.e3dc_maestro_advisor_amortisationszeit
            name: Amortisation
            icon: mdi:calendar-clock

          - type: tile
            entity: sensor.e3dc_maestro_advisor_zyklen_jahr_virt_akku
            name: Zyklen/Jahr
            icon: mdi:battery-sync-outline

      # ── Monatlicher Netzbezug ────────────────────────────────────────
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Monatlicher Netzbezug – Baseline vs. vermieden
            icon: mdi:calendar-month

          - type: markdown
            content: |
              {% set base = state_attr('sensor.e3dc_maestro_advisor_szenario', 'scenario_monthly_baseline_grid_in') or [] %}
              {% set avoid = state_attr('sensor.e3dc_maestro_advisor_szenario', 'scenario_monthly_avoided_kwh') or [] %}
              {% set months = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'] %}
              {% set vmax = (base + avoid) | map('float', 0) | max if base else 0 %}
              {% if base and vmax > 0 %}
              | Monat | Baseline kWh | Vermieden kWh | Verteilung |
              |-------|-------------:|--------------:|:-----------|
              {% for i in range(12) -%}
              {% set b = base[i] | float(0) %}
              {% set a = avoid[i] | float(0) %}
              {% set bw = (b / vmax * 20) | round(0, 'floor') | int %}
              {% set aw = (a / vmax * 20) | round(0, 'floor') | int %}
              | {{ months[i] }} | {{ b | round(0) }} | {{ a | round(0) }} | <span style="color:#e57373">{{ '█' * bw }}</span><span style="color:#66bb6a">{{ '█' * aw }}</span> |
              {% endfor %}

              <small>🟥 Baseline-Netzbezug · 🟩 vermiedener Netzbezug (Szenario)</small>
              {% else %}
              _Noch keine Szenario-Daten – bitte Analyse starten._
              {% endif %}

      # ── Autarkie je Akku-Erweiterung ─────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Autarkie je Akku-Erweiterung
            icon: mdi:battery-plus

          - type: markdown
            content: |
              {% set rows = state_attr('sensor.e3dc_maestro_advisor_sizing_matrix', 'autarky_by_battery_pv0') or [] %}
              {% if rows %}
              | + Akku kWh | Autarkie % | |
              |-----------:|-----------:|:--|
              {% for r in rows -%}
              {% set pct = r.autarky | float(0) %}
              {% set w = (pct / 100 * 30) | round(0, 'floor') | int %}
              | {{ r.b }} | {{ pct | round(1) }} | {{ '█' * w }}{{ '░' * (30 - w) }} |
              {% endfor %}
              {% else %}
              _Noch keine Sizing-Matrix – bitte Analyse starten._
              {% endif %}

      # ── Top-Szenarien ────────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Top-Szenarien – Ersparnis vs. Investition
            icon: mdi:trophy

          - type: markdown
            content: |
              {% set top = state_attr('sensor.e3dc_maestro_advisor_sizing_matrix', 'top_savings_scenarios') or [] %}
              {% if top %}
              {% set smax = top | map(attribute='savings') | map('float', 0) | max %}
              | +Akku/+PV | Ersparnis €/a | Invest € | Payback a | |
              |-----------|--------------:|---------:|----------:|:--|
              {% for r in top -%}
              {% set s = r.savings | float(0) %}
              {% set inv = r.invest | float(0) %}
              {% set pay = (inv / s) if s > 0 else 0 %}
              {% set sw = (s / smax * 15) | round(0, 'floor') | int if smax > 0 else 0 %}
              | +{{ r.b }}/+{{ r.p }} | {{ s | round(0) }} | {{ inv | round(0) }} | {{ pay | round(1) }} | <span style="color:#66bb6a">{{ '█' * sw }}</span> |
              {% endfor %}
              {% else %}
              _Noch keine Top-Szenarien – bitte Analyse starten._
              {% endif %}

      # ── Empfehlungen ─────────────────────────────────────────────────
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Empfehlungen
            icon: mdi:lightbulb-on

      - type: grid
        cards:
          - type: heading
            heading: Wirtschaftlich
            icon: mdi:cash

          - type: markdown
            content: |
              {% set rec = state_attr('sensor.e3dc_maestro_advisor_sizing_matrix', 'recommended_economic') %}
              {% if rec %}
              |  |  |
              |--|--|
              | Akku | **+{{ rec.battery_kwh }} kWh** |
              | PV | **+{{ rec.pv_kwp }} kWp** |
              | Payback | **{{ rec.payback_years }} a** |
              | Ersparnis | **{{ '{:,.0f}'.format(rec.savings_eur_per_year | float(0)) | replace(',', '.') }} €/a** |
              | Invest | **{{ '{:,.0f}'.format(rec.investment_eur | float(0)) | replace(',', '.') }} €** |
              {% else %}_keine Daten_{% endif %}

      - type: grid
        cards:
          - type: heading
            heading: Technisch
            icon: mdi:battery-high

          - type: markdown
            content: |
              {% set rec = state_attr('sensor.e3dc_maestro_advisor_sizing_matrix', 'recommended_technical') %}
              {% if rec %}
              |  |  |
              |--|--|
              | Akku | **+{{ rec.battery_kwh }} kWh** |
              | PV | **+{{ rec.pv_kwp }} kWp** |
              | Autarkie | **{{ rec.self_sufficiency_pct }} %** |
              | Ersparnis | **{{ '{:,.0f}'.format(rec.savings_eur_per_year | float(0)) | replace(',', '.') }} €/a** |
              | Invest | **{{ '{:,.0f}'.format(rec.investment_eur | float(0)) | replace(',', '.') }} €** |
              {% else %}_keine Daten_{% endif %}

      - type: grid
        cards:
          - type: heading
            heading: Ausgewogen
            icon: mdi:scale-balance

          - type: markdown
            content: |
              {% set rec = state_attr('sensor.e3dc_maestro_advisor_sizing_matrix', 'recommended_balanced') %}
              {% if rec %}
              |  |  |
              |--|--|
              | Akku | **+{{ rec.battery_kwh }} kWh** |
              | PV | **+{{ rec.pv_kwp }} kWp** |
              | Payback | **{{ rec.payback_years }} a** |
              | Autarkie | **{{ rec.self_sufficiency_pct }} %** |
              | Invest | **{{ '{:,.0f}'.format(rec.investment_eur | float(0)) | replace(',', '.') }} €** |
              {% else %}_keine Daten_{% endif %}

      # ── WR-Upgrade Warnung ────────────────────────────────────────────
      - type: grid
        column_span: 3
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.e3dc_maestro_advisor_wr_upgrade_empfohlen
                state: "on"
            card:
              type: markdown
              content: >-
                ## ⚠️ Wechselrichter-Upgrade empfohlen

                Die empfohlene PV-Erweiterung übersteigt die WR-Nennleistung.
                Für das wirtschaftliche Szenario wird ein WR-Upgrade
                eingerechnet.

          - type: markdown
            content: >-
              ### Simulationsannahmen

              | Parameter | Wert |
              |-----------|------|
              | Analysezeitraum | {{ state_attr('sensor.e3dc_maestro_advisor_sizing_matrix', 'analysis_days') }} Tage |
              | Datenpunkte | {{ state_attr('sensor.e3dc_maestro_advisor_sizing_matrix', 'records_count') }} Stunden |
              | Energiebilanz-Anomalien | {{ state_attr('sensor.e3dc_maestro_advisor_sizing_matrix', 'anomaly_rate_pct') }} % |
              | Baseline Netzbezug | {{ state_attr('sensor.e3dc_maestro_advisor_sizing_matrix', 'baseline_grid_import_kwh') }} kWh/Jahr |
              | Baseline Autarkie | {{ state_attr('sensor.e3dc_maestro_advisor_sizing_matrix', 'baseline_self_sufficiency_pct') }} % |

              > Die Simulation repliziert die gemessene Energiebilanz stündlich
              > und fügt eine virtuelle Batterie + PV-Skalierung hinzu.
              > Preise und Wirkungsgrad werden in den **Optionen** konfiguriert.

          - type: entities
            entities:
              - type: button
                name: "Hilfe Sizing Advisor"
                icon: mdi:help-circle-outline
                tap_action:
                  action: navigate
