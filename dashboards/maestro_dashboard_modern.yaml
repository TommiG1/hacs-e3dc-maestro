# =============================================================================
# E3DC Maestro – Modern Dashboard (Variante)
# =============================================================================
# Zweite, wählbare Dashboard-Version mit modernem Look.
# Das klassische Dashboard (dashboards/maestro_dashboard.yaml) bleibt unverändert.
#
# Voraussetzungen (HACS → Frontend):
#   - mini-graph-card        https://github.com/kalkih/mini-graph-card
#   - apexcharts-card        https://github.com/RomRider/apexcharts-card
#   - power-flow-card-plus   https://github.com/flixlix/power-flow-card-plus
#
# WICHTIG zum Slug / URL-Pfad:
#   Die Hilfe-Tabs verwenden interne Links wie /e3dc-maestro-modern/help-xyz.
#   Damit das funktioniert, MUSS der URL-Pfad des Dashboards exakt
#   `e3dc-maestro-modern` lauten. HA leitet diesen Slug aus dem Titel ab —
#   nenne das Dashboard daher beim Import "E3DC Maestro Modern", dann
#   stimmt der Slug automatisch.
#
# =============================================================================
# ▼▼▼ EINMALIG ANPASSEN: E3DC-Roh-Entitäten ▼▼▼
# -----------------------------------------------------------------------------
# Die folgenden Entity-IDs verweisen auf die Live-Leistungs- und SoC-Sensoren
# deiner E3DC-Anlage (z. B. aus der e3dc_rscp / e3dc-Integration).
# Ersetze sie ggf. durch deine echten Sensor-Namen — sie werden in der
# Power-Flow-Karte (Übersicht) und in der Live-Leistungs-Mini-Graph (Cockpit)
# verwendet.
#
#   sensor.e3dc_pv_power           # PV-Leistung    (W, ≥ 0)
#   sensor.e3dc_house_power        # Hausverbrauch  (W, ≥ 0)
#   sensor.e3dc_grid_power         # Netz           (W, + = Einspeisung, − = Bezug)
#   sensor.e3dc_battery_power      # Akku           (W, + = laden, − = entladen)
#   sensor.e3dc_soc                # Akku-Ladestand (%)
#
# Falls deine Sensoren andere Namen haben, ersetze sie unten in den
# Karten dieses Dashboards (Suche & Ersetzen über die ganze Datei).
# =============================================================================

title: E3DC Maestro Modern

# =============================================================================
# Wiederverwendbare button-card-Templates (nur für die Übersicht genutzt).
# Werden als JS-Templates evaluiert — referenzierbar via `template: <name>`.
# =============================================================================
button_card_templates:

  # ── Basis-Look: abgerundet, Schatten, sanfter Gradient, Hover-Lift ───────
  base_card:
    show_name: true
    show_state: true
    show_icon: true
    show_label: false
    styles:
      card:
        - border-radius: 18px
        - padding: 14px 16px
        - background: "linear-gradient(135deg, var(--card-background-color) 0%, color-mix(in srgb, var(--primary-color) 6%, var(--card-background-color)) 100%)"
        - box-shadow: 0 4px 14px rgba(0,0,0,0.10), 0 1px 2px rgba(0,0,0,0.06)
        - transition: transform 0.18s ease, box-shadow 0.18s ease
        - border: 1px solid color-mix(in srgb, var(--primary-text-color) 6%, transparent)
      icon:
        - width: 28px
        - color: var(--state-icon-color)
      name:
        - font-size: 12px
        - font-weight: 500
        - letter-spacing: 0.4px
        - text-transform: uppercase
        - opacity: 0.7
        - justify-self: start
      state:
        - font-size: 22px
        - font-weight: 700
        - justify-self: start
      grid:
        - grid-template-areas: '"i s" "n n"'
        - grid-template-columns: auto 1fr
        - grid-template-rows: 1fr auto
        - column-gap: 10px
        - row-gap: 6px
    extra_styles: |
      ha-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 22px rgba(0,0,0,0.14), 0 2px 4px rgba(0,0,0,0.08);
      }
      @keyframes maestro-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%      { opacity: 0.55; transform: scale(0.94); }
      }
      @keyframes maestro-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

  # ── KPI-Kachel mit Akzentstreifen ────────────────────────────────────────
  kpi:
    template: base_card
    styles:
      card:
        - height: 118px
        - position: relative
        - overflow: hidden

  # ── Power-Tile: Vorzeichen → Farbe (grün = produziert/einspeist) ─────────
  power_tile:
    template: kpi
    state:
      - operator: template
        value: "[[[ return parseFloat(entity.state) > 50 ]]]"
        styles:
          icon: [color: "#2e7d32"]
          state: [color: "#2e7d32"]
      - operator: template
        value: "[[[ return parseFloat(entity.state) < -50 ]]]"
        styles:
          icon: [color: "#c62828"]
          state: [color: "#c62828"]
    label: |
      [[[
        const v = parseFloat(entity.state);
        if (isNaN(v)) return '';
        return Math.abs(v) >= 1000
          ? (v / 1000).toFixed(2).replace('.', ',') + ' kW'
          : Math.round(v) + ' W';
      ]]]
    show_label: true
    styles:
      label:
        - font-size: 20px
        - font-weight: 700
        - justify-self: start
      state:
        - display: none
      grid:
        - grid-template-areas: '"i l" "n n"'

  # ── PV-spezifisch: Sonne, immer warm-gelb ────────────────────────────────
  pv_tile:
    template: power_tile
    styles:
      icon: [color: "#f9a825"]
      label: [color: "#f9a825"]

  # ── Haus: violett-grau ───────────────────────────────────────────────────
  house_tile:
    template: power_tile
    styles:
      icon: [color: "#6d4c41"]
      label: [color: "#6d4c41"]

  # ── Status-Chip: pulsiert, wenn aktiv ────────────────────────────────────
  status_chip:
    template: base_card
    show_state: false
    state:
      - value: "on"
        styles:
          icon:
            - animation: maestro-pulse 1.8s ease-in-out infinite
    styles:
      card:
        - height: 76px
        - padding: 10px 12px
      icon:
        - width: 26px
      name:
        - font-size: 12px
        - opacity: 0.9
        - text-transform: none
        - letter-spacing: 0
      grid:
        - grid-template-areas: '"i" "n"'
        - grid-template-columns: 1fr
        - grid-template-rows: 1fr auto
        - row-gap: 4px
        - justify-items: center
        - text-align: center

  # ── Action-Tile (Toggle/Button) ──────────────────────────────────────────
  action_tile:
    template: base_card
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    styles:
      card:
        - height: 96px
        - cursor: pointer
      grid:
        - grid-template-areas: '"i" "n"'
        - grid-template-columns: 1fr
        - grid-template-rows: 1fr auto
        - row-gap: 6px
        - justify-items: center
        - text-align: center
      icon:
        - width: 32px
      name:
        - font-size: 12px
        - opacity: 0.85
        - text-transform: none
        - letter-spacing: 0
    state:
      - value: "on"
        styles:
          card:
            - background: "linear-gradient(135deg, color-mix(in srgb, var(--success-color) 22%, var(--card-background-color)) 0%, var(--card-background-color) 100%)"
            - border: 1px solid color-mix(in srgb, var(--success-color) 38%, transparent)
          icon: [color: var(--success-color)]
      - value: "off"
        styles:
          icon: [color: "var(--disabled-text-color)"]

  # ── Phase-Hero: groß, farbig je nach Phase, Subtitle aus Letzte-Aktion ──
  phase_hero:
    show_name: false
    show_state: false
    show_icon: false
    show_label: false
    styles:
      card:
        - border-radius: 22px
        - padding: 22px 26px
        - min-height: 140px
        - background: |
            [[[
              const p = states['sensor.e3dc_maestro_regelphase'] ? states['sensor.e3dc_maestro_regelphase'].state : '';
              const low = states['binary_sensor.e3dc_maestro_schwacher_pv_tag'] && states['binary_sensor.e3dc_maestro_schwacher_pv_tag'].state === 'on';
              const palette = {
                emergency:          ['#b71c1c', '#e53935'],
                feed_in_limit:      ['#e65100', '#fb8c00'],
                force_discharge:    ['#bf360c', '#ef6c00'],
                curtailment:        ['#bf360c', '#ff7043'],
                reserve_protection: ['#0d47a1', '#1976d2'],
                evcc_pause:         ['#4a148c', '#7b1fa2'],
                ht_protection:      ['#4e342e', '#6d4c41'],
                pv_delay:           ['#1b5e20', '#43a047'],
                astro_wait:         ['#f57f17', '#fbc02d'],
                morning_cap:        ['#827717', '#afb42b'],
                corridor:           ['#1565c0', '#1e88e5'],
                spreading:          ['#00695c', '#26a69a'],
                predischarge:       ['#bf360c', '#ff7043'],
                idle:               ['#37474f', '#546e7a'],
                normal:             ['#1b5e20', '#2e7d32']
              };
              const colors = low ? ['#e65100', '#fb8c00'] : (palette[p] || ['#37474f', '#546e7a']);
              return `linear-gradient(135deg, ${colors[0]} 0%, ${colors[1]} 100%)`;
            ]]]
        - color: white
        - box-shadow: 0 10px 30px rgba(0,0,0,0.22)
        - overflow: hidden
        - position: relative
      custom_fields:
        icon:
          - position: absolute
          - top: 18px
          - right: 22px
          - font-size: 64px
          - opacity: 0.18
        title:
          - font-size: 28px
          - font-weight: 800
          - line-height: 1.1
          - letter-spacing: -0.5px
        subtitle:
          - font-size: 13px
          - opacity: 0.85
          - margin-top: 10px
          - line-height: 1.4
          - max-width: 88%
        badge:
          - margin-top: 14px
          - display: inline-block
          - padding: 4px 12px
          - border-radius: 999px
          - background: rgba(255,255,255,0.18)
          - backdrop-filter: blur(4px)
          - font-size: 11px
          - font-weight: 600
          - letter-spacing: 0.5px
          - text-transform: uppercase
    custom_fields:
      icon: |
        [[[
          const p = states['sensor.e3dc_maestro_regelphase'] ? states['sensor.e3dc_maestro_regelphase'].state : '';
          const low = states['binary_sensor.e3dc_maestro_schwacher_pv_tag'] && states['binary_sensor.e3dc_maestro_schwacher_pv_tag'].state === 'on';
          const iconmap = {
            emergency: 'alert-octagon', curtailment: 'weather-sunny-alert',
            feed_in_limit: 'transmission-tower-off', force_discharge: 'battery-arrow-down',
            pv_delay: 'clock-alert-outline', astro_wait: 'weather-sunset-up',
            morning_cap: 'battery-clock-outline', corridor: 'battery-charging',
            spreading: 'chart-bell-curve', predischarge: 'battery-arrow-down',
            reserve_protection: 'shield-half-full', evcc_pause: 'ev-plug-type2',
            ht_protection: 'clock-alert', idle: 'pause-circle-outline',
            normal: 'auto-mode'
          };
          const name = low ? 'weather-cloudy-clock' : (iconmap[p] || 'state-machine');
          return `<ha-icon icon="mdi:${name}"></ha-icon>`;
        ]]]
      title: |
        [[[
          const p = states['sensor.e3dc_maestro_regelphase'] ? states['sensor.e3dc_maestro_regelphase'].state : '—';
          const names = {
            emergency: 'Notfall-Reserve', curtailment: 'Curtailment-Schutz',
            feed_in_limit: 'Einspeisedrosselung', force_discharge: 'Erzwungene Entladung',
            pv_delay: 'PV-Verzögerung', astro_wait: 'Astro-Wartezeit',
            morning_cap: 'Morning-Cap', corridor: 'Lade-Korridor',
            spreading: 'Spreading', predischarge: 'Vorentladung',
            reserve_protection: 'Reserve-Schutz', ht_protection: 'HT-Schutz',
            evcc_pause: 'EVCC-Pause', idle: 'Leerlauf', normal: 'Normalbetrieb'
          };
          return names[p] || p;
        ]]]
      subtitle: |
        [[[
          const a = states['sensor.e3dc_maestro_letzte_aktion'];
          const exp = states['sensor.e3dc_maestro_entscheidungserklarung'];
          const txt = (exp && !['unknown','unavailable','none',''].includes(exp.state)) ? exp.state
                    : (a && !['unknown','unavailable','none',''].includes(a.state)) ? a.state
                    : 'Noch keine Regelentscheidung verfügbar';
          return txt.length > 180 ? txt.slice(0, 180) + '…' : txt;
        ]]]
      badge: |
        [[[
          const r = states['switch.e3dc_maestro_regelung_aktiv'];
          const e = states['binary_sensor.e3dc_maestro_e3dc_erreichbar'];
          if (!r || r.state !== 'on') return '⏸ Regelung pausiert';
          if (!e || e.state !== 'on')  return '⚠ E3DC offline';
          return '● Live · ' + (e.last_changed ? new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) : '');
        ]]]
    tap_action:
      action: more-info
      entity: sensor.e3dc_maestro_regelphase

  # ── SoC-Ring (kreisförmiger Akku-Indikator mit conic-gradient) ───────────
  soc_ring:
    show_name: false
    show_state: false
    show_icon: false
    show_label: false
    styles:
      card:
        - border-radius: 18px
        - padding: 16px
        - height: 240px
        - background: var(--card-background-color)
        - box-shadow: 0 4px 14px rgba(0,0,0,0.10)
        - border: 1px solid color-mix(in srgb, var(--primary-text-color) 6%, transparent)
      grid:
        - grid-template-areas: '"r" "t"'
        - grid-template-rows: 1fr auto
        - row-gap: 8px
        - justify-items: center
      custom_fields:
        ring:
          - grid-area: r
          - width: 170px
          - height: 170px
          - border-radius: 50%
          - display: grid
          - place-items: center
          - background: |
              [[[
                const soc = parseFloat(states['sensor.e3dc_soc'] ? states['sensor.e3dc_soc'].state : 0) || 0;
                const target = parseFloat(states['sensor.e3dc_maestro_ziel_soc'] ? states['sensor.e3dc_maestro_ziel_soc'].state : 0) || 0;
                const deg = (Math.max(0, Math.min(100, soc)) / 100) * 360;
                const color = soc < 25 ? '#e53935' : (soc < 50 ? '#fb8c00' : '#43a047');
                const tdeg = (Math.max(0, Math.min(100, target)) / 100) * 360;
                return `conic-gradient(${color} 0deg, ${color} ${deg}deg, color-mix(in srgb, var(--primary-text-color) 8%, transparent) ${deg}deg 360deg)`;
              ]]]
          - position: relative
        inner:
          - grid-area: r
          - width: 132px
          - height: 132px
          - border-radius: 50%
          - background: var(--card-background-color)
          - display: grid
          - place-items: center
          - justify-self: center
          - align-self: center
          - z-index: 2
        soc_text:
          - grid-area: r
          - z-index: 3
          - font-size: 38px
          - font-weight: 800
          - color: var(--primary-text-color)
          - line-height: 1
          - justify-self: center
          - align-self: center
        soc_unit:
          - grid-area: r
          - z-index: 3
          - font-size: 12px
          - font-weight: 600
          - opacity: 0.55
          - justify-self: center
          - align-self: end
          - margin-bottom: 50px
        bottom:
          - grid-area: t
          - font-size: 12px
          - opacity: 0.75
          - text-align: center
    custom_fields:
      ring: " "
      inner: " "
      soc_text: |
        [[[
          const s = parseFloat(states['sensor.e3dc_soc'] ? states['sensor.e3dc_soc'].state : NaN);
          return isNaN(s) ? '—' : Math.round(s);
        ]]]
      soc_unit: "%"
      bottom: |
        [[[
          const t = states['sensor.e3dc_maestro_ziel_soc'];
          const tv = t ? Math.round(parseFloat(t.state)) : '—';
          const z = states['sensor.e3dc_maestro_autonomiezeit'];
          const zt = z ? z.state : '—';
          return `Ziel ${tv} %  ·  Autonomie ${zt}`;
        ]]]
    tap_action:
      action: more-info
      entity: sensor.e3dc_soc

  # ── Money-Tile: Wert wird farbig (rot < 0, grün > 0) ─────────────────────
  money_tile:
    template: kpi
    state:
      - operator: template
        value: "[[[ return parseFloat(entity.state) > 0 ]]]"
        styles:
          state: [color: "#2e7d32"]
      - operator: template
        value: "[[[ return parseFloat(entity.state) < 0 ]]]"
        styles:
          state: [color: "#c62828"]
    label: |
      [[[
        const v = parseFloat(entity.state);
        if (isNaN(v)) return '—';
        return (v >= 0 ? '+' : '') + v.toFixed(2).replace('.', ',') + ' €';
      ]]]
    show_label: true
    show_state: false
    styles:
      label:
        - font-size: 22px
        - font-weight: 700
        - justify-self: start
      grid:
        - grid-template-areas: '"i l" "n n"'

views:

  # ========================================================================
  # TAB 1: ÜBERSICHT (button-card driven, modern UI)
  # ========================================================================
  - title: Übersicht
    icon: mdi:view-dashboard-variant
    path: uebersicht
    type: sections
    max_columns: 3
    sections:

      # ── Phase-Hero (volle Breite, JS-getrieben) ──────────────────────
      - type: grid
        column_span: 3
        cards:
          - type: custom:button-card
            template: phase_hero

      # ── SoC-Ring + 3 KPI-Tiles ───────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Akkustand & Sollwerte
            icon: mdi:battery-heart-variant

          - type: custom:button-card
            template: soc_ring

      - type: grid
        cards:
          - type: heading
            heading: Sollwerte jetzt
            icon: mdi:target

          - type: custom:button-card
            template: kpi
            entity: sensor.e3dc_maestro_ziel_soc
            name: Ziel-SoC
            icon: mdi:battery-heart-variant
            styles:
              icon: [color: "#43a047"]
              state: [color: "#43a047"]
            tap_action:
              action: more-info

          - type: custom:button-card
            template: kpi
            entity: sensor.e3dc_maestro_ziel_ladeleistung
            name: Ziel-Ladeleistung
            icon: mdi:lightning-bolt
            styles:
              icon: [color: "#f9a825"]
              state: [color: "#f9a825"]
            tap_action:
              action: more-info

          - type: custom:button-card
            template: kpi
            entity: sensor.e3dc_maestro_autonomiezeit
            name: Autonomiezeit
            icon: mdi:timer-sand
            styles:
              icon: [color: "#00acc1"]
              state: [color: "#00acc1"]
            tap_action:
              action: more-info

      # ── Energiefluss live (volle Breite) ─────────────────────────────
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Energiefluss live
            icon: mdi:transmission-tower

          - type: custom:power-flow-card-plus
            entities:
              grid:
                entity: sensor.e3dc_grid_power
                invert_state: false
                color_icon: true
              solar:
                entity: sensor.e3dc_pv_power
                color_icon: true
              battery:
                entity: sensor.e3dc_battery_power
                state_of_charge: sensor.e3dc_soc
                color_icon: true
              home:
                entity: sensor.e3dc_house_power
                color_icon: true
            clickable_entities: true
            display_zero_lines:
              mode: show
              transparency: 50
            kw_decimals: 2
            min_flow_rate: 0.4
            max_flow_rate: 6
            watt_threshold: 1000

      # ── Live-Leistungen (button-card, Vorzeichen → Farbe) ────────────
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Live-Leistungen
            icon: mdi:flash

          - type: custom:button-card
            template: pv_tile
            entity: sensor.e3dc_pv_power
            name: PV-Erzeugung
            icon: mdi:weather-sunny
            tap_action:
              action: more-info

          - type: custom:button-card
            template: house_tile
            entity: sensor.e3dc_house_power
            name: Hausverbrauch
            icon: mdi:home-lightning-bolt
            tap_action:
              action: more-info

          - type: custom:button-card
            template: power_tile
            entity: sensor.e3dc_grid_power
            name: Netz
            icon: mdi:transmission-tower
            tap_action:
              action: more-info

          - type: custom:button-card
            template: power_tile
            entity: sensor.e3dc_battery_power
            name: Akku
            icon: mdi:battery
            tap_action:
              action: more-info

      # ── Aktive Eingriffe (button-card Status-Chips, pulsieren wenn an) ─
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Aktive Eingriffe
            icon: mdi:shield-alert-outline

          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.e3dc_maestro_notfallladung_aktiv
                state: "on"
            card:
              type: custom:button-card
              template: status_chip
              entity: binary_sensor.e3dc_maestro_notfallladung_aktiv
              name: Notfall
              icon: mdi:alert-octagon
              styles:
                icon: [color: "#c62828"]
                card: [border: 1px solid "#c62828"]

          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.e3dc_maestro_abregelschutz_aktiv
                state: "on"
            card:
              type: custom:button-card
              template: status_chip
              entity: binary_sensor.e3dc_maestro_abregelschutz_aktiv
              name: Abregelschutz
              icon: mdi:weather-sunny-alert
              styles:
                icon: [color: "#ef6c00"]

          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.e3dc_maestro_einspeisedrosselung_aktiv
                state: "on"
            card:
              type: custom:button-card
              template: status_chip
              entity: binary_sensor.e3dc_maestro_einspeisedrosselung_aktiv
              name: Einspeisedrosselung
              icon: mdi:transmission-tower-off
              styles:
                icon: [color: "#c62828"]

          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.e3dc_maestro_ht_schutz_aktiv
                state: "on"
            card:
              type: custom:button-card
              template: status_chip
              entity: binary_sensor.e3dc_maestro_ht_schutz_aktiv
              name: HT-Schutz
              icon: mdi:clock-alert
              styles:
                icon: [color: "#6a1b9a"]

          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.e3dc_maestro_schwacher_pv_tag
                state: "on"
            card:
              type: custom:button-card
              template: status_chip
              entity: binary_sensor.e3dc_maestro_schwacher_pv_tag
              name: Schwacher PV-Tag
              icon: mdi:weather-cloudy-clock
              styles:
                icon: [color: "#fb8c00"]
              tap_action:
                action: navigate
                navigation_path: /e3dc-maestro-modern/help-low-yield

          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.e3dc_maestro_ladesperre_aktiv
                state: "on"
            card:
              type: custom:button-card
              template: status_chip
              entity: binary_sensor.e3dc_maestro_ladesperre_aktiv
              name: Ladesperre
              icon: mdi:battery-lock
              styles:
                icon: [color: "#c62828"]

          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.e3dc_maestro_entladesperre_aktiv
                state: "on"
            card:
              type: custom:button-card
              template: status_chip
              entity: binary_sensor.e3dc_maestro_entladesperre_aktiv
              name: Entladesperre
              icon: mdi:battery-off-outline
              styles:
                icon: [color: "#c62828"]

          # Wenn KEIN Eingriff aktiv ist: zeige eine grüne „bereit"-Karte
          - type: custom:button-card
            entity: sensor.e3dc_maestro_regelphase
            template: status_chip
            name: Alles im grünen Bereich
            icon: mdi:check-circle-outline
            styles:
              icon: [color: "#43a047"]
            state:
              - operator: template
                value: |
                  [[[
                    return ['notfallladung_aktiv','abregelschutz_aktiv','einspeisedrosselung_aktiv',
                            'ht_schutz_aktiv','schwacher_pv_tag','ladesperre_aktiv','entladesperre_aktiv']
                      .some(k => states['binary_sensor.e3dc_maestro_' + k] &&
                                  states['binary_sensor.e3dc_maestro_' + k].state === 'on');
                  ]]]
                styles:
                  card: [display: none]

      # ── Schnellsteuerung (button-card Action-Tiles) ──────────────────
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Schnellsteuerung
            icon: mdi:tune

          - type: custom:button-card
            template: action_tile
            entity: switch.e3dc_maestro_regelung_aktiv
            name: Regelung aktiv
            icon: mdi:power

          - type: custom:button-card
            template: action_tile
            entity: switch.e3dc_maestro_erzwungene_entladung
            name: Erzwungene Entladung
            icon: mdi:battery-arrow-down

          - type: custom:button-card
            template: action_tile
            entity: binary_sensor.e3dc_maestro_e3dc_erreichbar
            name: E3DC erreichbar
            icon: mdi:check-network
            tap_action:
              action: more-info

          - type: custom:button-card
            template: action_tile
            entity: button.e3dc_maestro_manuell_laden_3_kwh
            name: Manuell 3 kWh laden
            icon: mdi:battery-plus
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.e3dc_maestro_manuell_laden_3_kwh

      # ── SoC-Verlauf 24 h ─────────────────────────────────────────────
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: SoC – 24 h
            icon: mdi:battery-charging-60

          - type: custom:mini-graph-card
            name: Ist vs. Ziel
            hours_to_show: 24
            points_per_hour: 4
            line_width: 3
            animate: true
            show:
              labels: true
              extrema: true
              fill: fade
            entities:
              - entity: sensor.e3dc_soc
                name: Ist-SoC
                color: var(--success-color)
              - entity: sensor.e3dc_maestro_ziel_soc
                name: Ziel-SoC
                color: var(--info-color)
                show_line: true
                show_fill: false

      # ── Leistungs-Mini-Graph 24 h ────────────────────────────────────
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Leistungen – 24 h
            icon: mdi:flash

          - type: custom:mini-graph-card
            name: PV / Haus / Netz / Akku
            hours_to_show: 24
            points_per_hour: 4
            line_width: 2
            smoothing: true
            animate: true
            show:
              labels: true
              legend: true
              fill: fade
            entities:
              - entity: sensor.e3dc_pv_power
                name: PV
                color: "#f9a825"
              - entity: sensor.e3dc_house_power
                name: Haus
                color: "#6d4c41"
              - entity: sensor.e3dc_grid_power
                name: Netz
                color: "#1976d2"
              - entity: sensor.e3dc_battery_power
                name: Akku
                color: "#2e7d32"

      # ── Tagesstatistik (button-card KPIs + Mini-Graph) ───────────────
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Tagesstatistik
            icon: mdi:chart-box-outline

          - type: custom:button-card
            template: kpi
            entity: sensor.e3dc_maestro_geladen_heute
            name: Geladen heute
            icon: mdi:battery-plus
            styles:
              icon: [color: "#43a047"]
              state: [color: "#43a047"]

          - type: custom:button-card
            template: kpi
            entity: sensor.e3dc_maestro_entladen_heute
            name: Entladen heute
            icon: mdi:battery-minus
            styles:
              icon: [color: "#ef6c00"]
              state: [color: "#ef6c00"]

          - type: custom:button-card
            template: kpi
            entity: sensor.e3dc_maestro_abregelung_verhindert_heute
            name: Einspeiselimit gesichert
            icon: mdi:shield-check
            styles:
              icon: [color: "#00897b"]
              state: [color: "#00897b"]

          - type: custom:button-card
            template: kpi
            entity: sensor.e3dc_maestro_einspeise_eingriffe_heute
            name: Einspeise-Eingriffe
            icon: mdi:transmission-tower
            styles:
              icon: [color: "#3949ab"]
              state: [color: "#3949ab"]

          - type: custom:mini-graph-card
            name: Geladen / Entladen heute
            hours_to_show: 24
            points_per_hour: 4
            line_width: 3
            show:
              labels: true
              legend: true
              fill: fade
            entities:
              - entity: sensor.e3dc_maestro_geladen_heute
                name: Geladen
                color: "#2e7d32"
              - entity: sensor.e3dc_maestro_entladen_heute
                name: Entladen
                color: "#ef6c00"

      # ── Erträge & Kosten heute (button-card Money-Tiles + Details) ───
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Erträge & Kosten heute
            icon: mdi:currency-eur

          - type: custom:button-card
            template: money_tile
            entity: sensor.e3dc_maestro_pv_ersparnis_heute
            name: PV-Ersparnis
            icon: mdi:cash-plus

          - type: custom:button-card
            template: money_tile
            entity: sensor.e3dc_maestro_einspeise_erlos_heute
            name: Einspeise-Erlös
            icon: mdi:transmission-tower-export

          - type: custom:button-card
            template: money_tile
            entity: sensor.e3dc_maestro_stromkosten_heute
            name: Netzbezugskosten
            icon: mdi:cash-minus
            label: |
              [[[
                const v = parseFloat(entity.state);
                if (isNaN(v)) return '—';
                return '−' + Math.abs(v).toFixed(2).replace('.', ',') + ' €';
              ]]]
            styles:
              label: [color: "#c62828"]

          - type: custom:button-card
            template: money_tile
            entity: sensor.e3dc_maestro_energiebilanz_heute
            name: Bilanz heute
            icon: mdi:scale-balance
            styles:
              card:
                - background: |
                    [[[
                      const v = parseFloat(entity.state);
                      if (isNaN(v)) return 'var(--card-background-color)';
                      const a = v >= 0 ? '#43a047' : '#c62828';
                      return `linear-gradient(135deg, color-mix(in srgb, ${a} 18%, var(--card-background-color)) 0%, var(--card-background-color) 100%)`;
                    ]]]

          - type: entities
            state_color: true
            entities:
              - entity: sensor.e3dc_maestro_pv_eigenverbrauch_heute
                name: PV-Eigenverbrauch
              - entity: sensor.e3dc_maestro_netto_stromkosten_heute
                name: Netto-Stromkosten (Kosten − Erlös)
              - type: divider
              - entity: sensor.e3dc_maestro_netzbezug_heute
                name: Netzbezug (kWh)
              - entity: sensor.e3dc_maestro_netzeinspeisung_heute
                name: Netzeinspeisung (kWh)
              - entity: binary_sensor.e3dc_maestro_netzladung_ohne_rechtfertigung
                name: Netzladung ohne Rechtfertigung
              - type: divider
              - type: button
                name: Wie wird das berechnet?
                icon: mdi:help-circle-outline
                action_name: Hilfe öffnen
                tap_action:
                  action: navigate
                  navigation_path: /e3dc-maestro-modern/help-kostenmodul

      # ── Morgen-Prognose (button-card KPIs) ───────────────────────────
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Morgen-Prognose
            icon: mdi:weather-sunny

          - type: custom:button-card
            template: kpi
            entity: sensor.e3dc_maestro_vorausschauendes_ladeziel
            name: Ladeziel morgen
            icon: mdi:battery-charging-high
            styles:
              icon: [color: "#43a047"]
              state: [color: "#43a047"]

          - type: custom:button-card
            template: kpi
            entity: sensor.e3dc_maestro_morgen_pv_prognose
            name: PV morgen
            icon: mdi:weather-sunny
            styles:
              icon: [color: "#f9a825"]
              state: [color: "#f9a825"]

          - type: custom:button-card
            template: kpi
            entity: sensor.e3dc_maestro_morgen_energiedefizit
            name: Defizit morgen
            icon: mdi:transmission-tower-import
            styles:
              icon: [color: "#c62828"]
              state: [color: "#c62828"]

      # ── Letzte Aktion (Markdown bleibt – ist textuell) ───────────────
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Letzte Aktion
            icon: mdi:history

          - type: markdown
            content: >-
              **Phase:** {{ states('sensor.e3dc_maestro_letzte_aktion') }}


              **Grund:** {{ state_attr('sensor.e3dc_maestro_letzte_aktion', 'reason') or '—' }}


              **Zeitpunkt:** {{ state_attr('sensor.e3dc_maestro_letzte_aktion', 'timestamp') or '—' }}


              **Modus:** {{ state_attr('sensor.e3dc_maestro_letzte_aktion', 'power_mode') or '—' }}


              **Soll-Lade-Limit:** {{ state_attr('sensor.e3dc_maestro_letzte_aktion', 'charge_power_limit') or '—' }} W


              **Gesendetes Lade-Limit:** {{ state_attr('sensor.e3dc_maestro_letzte_aktion', 'sent_charge_power_limit') or '—' }} W

          - type: conditional
            conditions:
              - condition: state
                entity: sensor.e3dc_maestro_regelphase
                state: pv_delay
            card:
              type: custom:button-card
              template: kpi
              entity: sensor.e3dc_maestro_verzogerter_ladestart_heute
              name: Verzögerter Ladestart
              icon: mdi:clock-alert-outline
              styles:
                icon: [color: "#9ccc65"]
                state: [color: "#9ccc65"]
              tap_action:
                action: navigate
                navigation_path: /e3dc-maestro-modern/help-pv-delay


  # ========================================================================
  # TAB 2: COCKPIT
  # ========================================================================
  - title: Cockpit
    icon: mdi:gauge
    path: cockpit
    type: sections
    max_columns: 3
    sections:

      # ── Hero-Karte mit Regelphase und Begründung ─────────────────────
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Regelungs-Cockpit
            icon: mdi:gauge

          - type: markdown
            content: |
              {% set p = states('sensor.e3dc_maestro_regelphase') %}
              {% set names = {
                'emergency': 'Notfall-Reserve',
                'curtailment': 'Curtailment-Schutz',
                'feed_in_limit': 'Einspeisedrosselung',
                'force_discharge': 'Erzwungene Entladung',
                'pv_delay': 'PV-Verzögerung',
                'astro_wait': 'Astro-Wartezeit',
                'morning_cap': 'Morning-Cap',
                'corridor': 'Lade-Korridor',
                'spreading': 'Spreading',
                'predischarge': 'Vorentladung',
                'reserve_protection': 'Reserve-Schutz',
                'ht_protection': 'HT-Schutz',
                'evcc_pause': 'EVCC-Pause',
                'hold': 'Halten',
                'idle': 'Leerlauf',
                'normal': 'Normalbetrieb'
              } %}
              {% set low = is_state('binary_sensor.e3dc_maestro_schwacher_pv_tag', 'on') %}
              {% set q = (states('sensor.e3dc_maestro_pv_tag_quote') | float(0) * 100) | round(0) %}

              ## {{ names.get(p, p) | default('—') }}

              {{ states('sensor.e3dc_maestro_entscheidungserklarung') }}

              {% if low %}

              ⚠️ **Schwacher PV-Tag** ({{ q }} % vom Referenztag) — Akku-Ladung
              priorisiert, Spreading & Korridor-Pause für heute ausgesetzt.
              {% endif %}

          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.e3dc_maestro_schwacher_pv_tag
                state: "on"
            card:
              type: tile
              entity: binary_sensor.e3dc_maestro_schwacher_pv_tag
              name: Schwacher PV-Tag – Hilfe öffnen
              icon: mdi:weather-cloudy-clock
              color: orange
              tap_action:
                action: navigate
                navigation_path: /e3dc-maestro-modern/help-low-yield

      # ── Gauges: Ziel-SoC & Ziel-Ladeleistung ─────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Sollwerte
            icon: mdi:target

          - type: gauge
            entity: sensor.e3dc_maestro_ziel_soc
            name: Ziel-SoC
            min: 0
            max: 100
            needle: true
            severity:
              green: 70
              yellow: 40
              red: 0

          - type: gauge
            entity: sensor.e3dc_maestro_ziel_ladeleistung
            name: Ziel-Ladeleistung
            unit: W
            min: 0
            max: 9000
            needle: true
            severity:
              green: 1000
              yellow: 300
              red: 0

      # ── Live-Leistungen (Mini-Graph) ─────────────────────────────────
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Live-Leistungen
            icon: mdi:chart-line

          - type: custom:mini-graph-card
            name: PV / Haus / Netz / Akku – 12 h
            hours_to_show: 12
            points_per_hour: 12
            line_width: 2
            smoothing: true
            animate: true
            show:
              labels: true
              legend: true
              fill: fade
              extrema: false
            entities:
              - entity: sensor.e3dc_pv_power
                name: PV
                color: "#f9a825"
              - entity: sensor.e3dc_house_power
                name: Haus
                color: "#6d4c41"
              - entity: sensor.e3dc_grid_power
                name: Netz
                color: "#1976d2"
              - entity: sensor.e3dc_battery_power
                name: Akku
                color: "#2e7d32"

      # ── Soll vs. Gesendet (E3DC-Drift) ───────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Soll vs. Gesendet (E3DC)
            icon: mdi:swap-horizontal

          - type: tile
            entity: sensor.e3dc_maestro_aktives_lade_limit
            name: Soll-Lade-Limit
            icon: mdi:battery-lock
            color: blue

          - type: tile
            entity: sensor.e3dc_maestro_gesendetes_lade_limit
            name: Gesendetes Lade-Limit
            icon: mdi:battery-arrow-up
            color: green

          - type: tile
            entity: sensor.e3dc_maestro_aktives_entlade_limit
            name: Soll-Entlade-Limit
            icon: mdi:battery-off-outline
            color: amber

          - type: tile
            entity: sensor.e3dc_maestro_gesendetes_entlade_limit
            name: Gesendetes Entlade-Limit
            icon: mdi:battery-arrow-down
            color: deep-orange

          - type: markdown
            content: >-
              {% set s1 = states('sensor.e3dc_maestro_aktives_lade_limit') | float(0) %}
              {% set s2 = states('sensor.e3dc_maestro_gesendetes_lade_limit') | float(0) %}
              {% set d1 = states('sensor.e3dc_maestro_aktives_entlade_limit') | float(0) %}
              {% set d2 = states('sensor.e3dc_maestro_gesendetes_entlade_limit') | float(0) %}
              {% set drift_c = (s1 - s2) | abs %}
              {% set drift_d = (d1 - d2) | abs %}
              {% if drift_c > 50 or drift_d > 50 %}
              ⚠️ **Drift erkannt** — Soll und Gesendet weichen auseinander
              (Lade Δ {{ drift_c | round(0) }} W, Entlade Δ {{ drift_d | round(0) }} W).
              [→ Hilfe Steuerverhalten](/e3dc-maestro-modern/help-steuerverhalten)
              {% else %}
              ✅ Lade-/Entlade-Limits sind synchron (Δ ≤ 50 W).
              {% endif %}

      # ── Live-Tuning: PV-Verzögerung ──────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Live-Tuning · PV-Verzögerung
            icon: mdi:clock-alert-outline

          - type: entities
            entities:
              - entity: switch.e3dc_maestro_vorausschauende_ladung
                name: Vorausschauende Ladung aktiv
              - entity: switch.e3dc_maestro_pv_prognose_verzogerung
                name: PV-Prognose-Verzögerung aktiv
              - entity: number.e3dc_maestro_mindest_soc_vor_verzogerung
                name: Mindest-SoC vor Verzögerung
              - entity: number.e3dc_maestro_pv_forecast_schwelle
                name: PV-Forecast Schwelle
              - entity: number.e3dc_maestro_pv_forecast_sicherheitsfaktor
                name: PV-Forecast Sicherheitsfaktor
              - type: button
                name: "Hilfe zu diesem Abschnitt"
                icon: mdi:help-circle-outline
                tap_action:
                  action: navigate
                  navigation_path: /e3dc-maestro-modern/help-pv-delay

      # ── Live-Tuning: Schwacher-PV-Tag ────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Live-Tuning · Schwacher-PV-Tag
            icon: mdi:weather-cloudy-clock

          - type: entities
            entities:
              - entity: switch.e3dc_maestro_schwacher_pv_tag_prioritat
                name: Priorität aktiv
              - entity: binary_sensor.e3dc_maestro_schwacher_pv_tag
                name: Heute erkannt
              - entity: sensor.e3dc_maestro_pv_tagesprognose
                name: PV-Tagesprognose
              - entity: sensor.e3dc_maestro_pv_referenz_ertrag
                name: PV-Referenz-Ertrag
              - entity: sensor.e3dc_maestro_pv_tag_quote
                name: PV-Tag Quote
              - entity: number.e3dc_maestro_schwacher_pv_tag_schwelle
                name: Schwelle (Anteil 0–1)
              - entity: number.e3dc_maestro_pv_referenz_manuell_0_automatisch
                name: PV-Referenz manuell (0 = auto)
              - entity: number.e3dc_maestro_pv_referenz_faktor_kwh_kwp
                name: PV-Referenz Faktor (kWh/kWp)
              - type: button
                name: "Hilfe zu diesem Abschnitt"
                icon: mdi:help-circle-outline
                tap_action:
                  action: navigate
                  navigation_path: /e3dc-maestro-modern/help-low-yield

      # ── Live-Tuning: Astro / Morning-Cap ─────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Live-Tuning · Astro & Morning-Cap
            icon: mdi:weather-sunset-up

          - type: entities
            entities:
              - entity: switch.e3dc_maestro_astro_modus_sonnenuberwachung
                name: Astro-Modus aktiv
              - entity: number.e3dc_maestro_ladestart_offset_nach_sonnenaufgang
                name: Ladestart Offset nach Sonnenaufgang (h)
              - entity: number.e3dc_maestro_ladeende_offset_zu_sonnenuntergang
                name: Ladeende Offset zu Sonnenuntergang (h)
              - type: divider
              - entity: switch.e3dc_maestro_morning_cap_soc_deckel_morgens
                name: Morning-Cap aktiv
              - entity: number.e3dc_maestro_morning_cap_soc_grenze
                name: Morning-Cap SoC-Grenze (%)
              - entity: number.e3dc_maestro_morning_cap_aktiv_bis_uhr_lokal
                name: Morning-Cap bis Uhr (lokal)
              - type: button
                name: "Hilfe Astro"
                icon: mdi:help-circle-outline
                tap_action:
                  action: navigate
                  navigation_path: /e3dc-maestro-modern/help-astro
              - type: button
                name: "Hilfe Morning-Cap"
                icon: mdi:help-circle-outline
                tap_action:
                  action: navigate
                  navigation_path: /e3dc-maestro-modern/help-flat-curve

      # ── Phasenverlauf 24 h ───────────────────────────────────────────
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Phasenverlauf 24 h
            icon: mdi:chart-timeline

          - type: history-graph
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.e3dc_maestro_regelphase
                name: Phase
              - entity: sensor.e3dc_maestro_letzte_aktion
                name: Aktion
              - entity: binary_sensor.e3dc_maestro_schwacher_pv_tag
                name: Schwacher PV-Tag

  # ========================================================================
  # TAB 3: LADEN (Ladestrategie & Optimierung)
  # ========================================================================
  - title: Laden
    icon: mdi:battery-charging-outline
    path: laden
    type: sections
    max_columns: 3
    sections:

      # ── Status-Übersicht aktiver Strategien ──────────────────────────
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Aktive Ladestrategien
            icon: mdi:strategy

          - type: tile
            entity: switch.e3dc_maestro_abregelschutz
            name: Abregelschutz
            icon: mdi:shield
            color: amber
            tap_action:
              action: toggle

          - type: tile
            entity: switch.e3dc_maestro_ladeverteilung_spreading
            name: Spreading
            icon: mdi:chart-timeline-variant
            color: teal
            tap_action:
              action: toggle

          - type: tile
            entity: switch.e3dc_maestro_schwacher_pv_tag_prioritat
            name: Schwacher-PV-Tag
            icon: mdi:weather-cloudy-clock
            color: orange
            tap_action:
              action: toggle

          - type: tile
            entity: switch.e3dc_maestro_korridor_pause_min_ladeleistung
            name: Korridor-Pause
            icon: mdi:pause-circle
            color: blue
            tap_action:
              action: toggle

          - type: tile
            entity: switch.e3dc_maestro_spat_ladung_two_tier
            name: Two-Tier (Spät-Ladung)
            icon: mdi:sort-clock-descending
            color: purple
            tap_action:
              action: toggle

          - type: tile
            entity: switch.e3dc_maestro_saisonale_notstromreserve
            name: Notstromreserve
            icon: mdi:battery-heart
            color: green
            tap_action:
              action: toggle

      # ── Geladen/Entladen Verlauf ─────────────────────────────────────
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Lade-/Entlade-Verlauf
            icon: mdi:chart-areaspline

          - type: custom:mini-graph-card
            name: Lade-/Entlade-Energie heute
            hours_to_show: 24
            points_per_hour: 4
            line_width: 3
            show:
              labels: true
              legend: true
              fill: fade
              extrema: true
            entities:
              - entity: sensor.e3dc_maestro_geladen_heute
                name: Geladen
                color: "#2e7d32"
              - entity: sensor.e3dc_maestro_entladen_heute
                name: Entladen
