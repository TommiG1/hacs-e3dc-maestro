  - title: Hilfe
    icon: mdi:help-circle-outline
    path: hilfe
    type: sections
    max_columns: 2
    sections:

      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Glossar & Erklärungen
            icon: mdi:book-open-variant

          - type: markdown
            content: |
              ## Inhaltsverzeichnis

              **Regellogik & Phasen** — alle Engine-Phasen sind unten im Glossar
              (Priorität wie in `decide()`).

              **Feature-Hilfen (Detail-Seiten)**

              | Bereich | Hilfe-Seite |
              |---|---|
              | Ladekorridor (SoC-Rampe, Ladeende, Hard-SoC) | [→ Ladekorridor](/e3dc-maestro-modern/help-ladekorridor) |
              | Ladeverteilung (Spreading) | [→ Spreading](/e3dc-maestro-modern/help-spreading) |
              | PV-Verzögerung & Vorausschauende Ladung | [→ PV-Verzögerung](/e3dc-maestro-modern/help-pv-delay) |
              | Schwacher-PV-Tag (Akku-Priorität) | [→ Schwacher-PV-Tag](/e3dc-maestro-modern/help-low-yield) |
              | Abregelschutz (Curtailment Guard) | [→ Abregelschutz](/e3dc-maestro-modern/help-curtailment) |
              | Spät-Ladung (Two-Tier) | [→ Two-Tier](/e3dc-maestro-modern/help-two-tier) |
              | Astro-Modus (Sonnenuntergang) | [→ Astro](/e3dc-maestro-modern/help-astro) |
              | HT/NT-Schutz | [→ HT-Schutz](/e3dc-maestro-modern/help-ht) |
              | Dynamischer Tarif | [→ Tarif](/e3dc-maestro-modern/help-tarif) |
              | Tarif-Slots | [→ Tarif-Slots](/e3dc-maestro-modern/help-tariff-slots) |
              | EVCC – Akku-Entladesperre | [→ EVCC](/e3dc-maestro-modern/help-evcc) |
              | Wallbox-Überschussregelung | [→ Wallbox](/e3dc-maestro-modern/help-wallbox) |
              | Wärmepumpe | [→ Wärmepumpe](/e3dc-maestro-modern/help-wp) |
              | Morgen-Vorentladung | [→ Vorentladung](/e3dc-maestro-modern/help-vorentladung) |
              | Morning-Cap & Schonladung | [→ Morning-Cap](/e3dc-maestro-modern/help-flat-curve) |
              | Adaptive Reserve | [→ Adaptive Reserve](/e3dc-maestro-modern/help-adaptive-reserve) |
              | Notstromreserve | [→ Notstromreserve](/e3dc-maestro-modern/help-notstromreserve) |
              | Hardware-Parameter | [→ Hardware](/e3dc-maestro-modern/help-hardware) |
              | Steuerverhalten | [→ Steuerverhalten](/e3dc-maestro-modern/help-steuerverhalten) |
              | Auto-Optimierung | [→ Auto](/e3dc-maestro-modern/help-auto) |
              | Kostenmodul (€-Sensoren, Bilanz) | [→ Kostenmodul](/e3dc-maestro-modern/help-kostenmodul) |
              | Sizing Advisor | [→ Sizing Advisor](/e3dc-maestro-modern/help-sizing-advisor) |

      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Regelphase – Glossar
            icon: mdi:state-machine

          - type: markdown
            content: |
              Maestro wählt in jedem Zyklus genau **eine** aktive Phase. Die
              Reihenfolge entspricht der Priorität in der Engine (`decide()`):
              höhere Einträge übersteuern alle darunter.

              | Priorität | Phase | Bedeutung |
              |---|---|---|
              | 1 | **off** | Regelung deaktiviert (Master-Switch aus) |
              | 2 | **force_discharge** | Manuelle Entladung (Dashboard-Schalter) – vor Emergency |
              | 3 | **emergency** | SoC unter Ladeschwelle → Notfallladung mit voller Leistung |
              | 4 | **feed_in_limit** | Netzeinspeisung über Limit → Ladeleistung anheben |
              | 5 | **reserve_protection** | Notstromreserve → Entladung gesperrt |
              | 6 | **evcc_pause** | EVCC Sofortladen → Akku-Entladegrenze |
              | 7 | **ht_protection** | Hochtarif-Fenster → kein Entladen über Reserve |
              | 8 | **morning_discharge** | Morgen-Vorentladung (Kapazität für Tages-PV schaffen) |
              | 9 | **morning_cap** | SoC-Deckel morgens bis konfigurierte Uhrzeit |
              | 10 | **astro_wait** | Warten auf Sonnenaufgang + Offset (kein Laden) |
              | 11 | **hard_soc_limit** | Harter Max-SoC-Deckel (Akku-Schonung) |
              | 12 | **fast_floor** | Schnelllade-Boden: voller PV-Überschuss bis Floor-SoC |
              | 13 | **pv_delay** | Gute PV-Prognose → Korridor-Ladung verzögert |
              | 14 | **corridor** | Saisonaler Ladekorridor / Schwacher-PV-Tag-Überschuss |
              | 15 | **spreading** | Ladeverteilung über Restzeit bis Ladeende |
              | 16 | **curtailment_guard** | Abregelschutz – Mindestladung gegen PV-Verlust |
              | 17 | **idle** | Kein Ladebedarf / Korridor-Pause / außerhalb Fenster |

              Hinweis: Die Entity-Option `manual` existiert nur als Anzeige-Label
              und wird von der Engine derzeit nicht gesetzt.

      - type: grid
        cards:
          - type: heading
            heading: Erzwungene Entladung (force_discharge)
            icon: mdi:battery-arrow-down

          - type: markdown
            content: |
              Die erzwungene Entladung wird **manuell** über den Switch
              *Erzwungene Entladung* oder die zugehörige Number-Entity
              ausgelöst. Maestro entlädt den Akku dann aktiv — **direkt nach
              dem Master-Switch**, noch vor Emergency und allen anderen Phasen.

              **Wann sinnvoll?**
              - Vor einem günstigen Nachtstrom-Ladefenster (Tibber): Akku
                leeren, damit er anschließend günstig aufgeladen werden kann.
              - Manueller Lastausgleich bei Netzengpass.
              - Test der E3DC-Entladefunktion.

              **Grenzen:**
              - Maestro entlädt nie unter die aktive Notstromreserve /
                Ladeschwelle (Floor). Darunter wechselt die Phase in Pause
                (`IDLE`), bleibt aber `force_discharge`.
              - Die Entladeleistung ist durch die Number-Entity (W) begrenzt.
              - Solange der Schalter an ist, wird **keine** Emergency-Phase
                erreicht — der Floor ersetzt die Notfalllogik.

              **Sicherheit:** Die erzwungene Entladung schaltet sich **nicht
              automatisch ab**. Sie muss manuell deaktiviert oder durch eine
              Automatisierung zeitlich begrenzt werden.

      - type: grid
        cards:
          - type: heading
            heading: Schnelllade-Boden (fast_floor)
            icon: mdi:battery-fast

          - type: markdown
            content: |
              Unter dem konfigurierten Floor-SoC lädt Maestro mit **voller
              max_charge_power** (kein Korridor-Cap), damit die Mindestreserve
              schnell aus PV-Überschuss aufgebaut wird. Sobald der Floor
              erreicht ist, greifen wieder Korridor, Spreading oder Idle.

              Abregelschutz kann den Floor übersteuern. Schalter und SoC-Ziel
              liegen unter *Steuerverhalten*.

      - type: grid
        cards:
          - type: heading
            heading: Entscheidungserklärung
            icon: mdi:comment-question-outline

          - type: markdown
            content: |
              Im Cockpit erklärt der Block *Warum diese Entscheidung?* die
              aktuelle Phase in Klartext. Die Texte kommen aus der
              Engine-Erklärung und spiegeln denselben Prioritätsbaum wie das
              Glossar oben.

      - type: grid
        cards:
          - type: heading
            heading: Anti-Flapping
            icon: mdi:wave

          - type: markdown
            content: |
              Maestro dämpft Phasen- und Leistungsflackern an mehreren Stellen:

              - **SoC-Hysterese:** Der Regel-SoC folgt dem Rohwert erst ab einer
                Totzone (`soc_hysteresis_percent`).
              - **EWMA-Glättung:** PV-, Haus- und Wallbox-Leistung werden
                geglättet, bevor Korridor/Abregelung daraus ableiten.
              - **Curtailment-Hysterese:** Ein-/Ausschaltschwellen verhindern
                Pendeln am Abregelungsrand.
              - **Feed-in-Limit-Hysterese:** Verhindert schnelles An/Aus der
                Einspeise-Limit-Phase.

              Detail-Parameter:
              [→ Steuerverhalten](/e3dc-maestro-modern/help-steuerverhalten)

      - type: grid
        cards:
          - type: heading
            heading: EVCC-Sperre vs. Wallbox-Überschuss
            icon: mdi:compare

          - type: markdown
            content: |
              Diese beiden Features sind **vollständig unabhängig** voneinander:

              | | EVCC-Entladesperre | Wallbox-Überschussregelung |
              |---|---|---|
              | **Was sie tut** | Sperrt Akku-Entladung wenn Auto im Sofortladen-Modus | Regelt Ladestrom der Wallbox nach PV-Überschuss |
              | **Einfluss auf** | E3DC-Akku (discharge limit) | Wallbox-Ladestrom (A) |
              | **Gesteuert über** | EVCC Lädt-Sensor + Modus-Sensor | PV-Überschuss-Berechnung |
              | **Schalter** | `switch.e3dc_maestro_evcc_integration` | `switch.e3dc_maestro_wallbox_regelung` |

              Beide Schalter können unabhängig aktiviert/deaktiviert werden.
              Die EVCC-Entladesperre funktioniert auch ohne Wallbox-Regelung
              und umgekehrt.

  # ========================================================================
  # HILFE-SUBVIEWS (1:1 aus Classic, nur Slug-Pfade auf "/e3dc-maestro-modern/" angepasst)
  # ========================================================================

  - title: "Hilfe: Ladekorridor"
    path: help-ladekorridor
    subview: true
    cards:
      - type: markdown
        content: |
          ## Ladekorridor – Parameter
          
          Der Ladekorridor definiert den saisonalen Tagesplan: bis wann und auf wie viel
          Prozent der Akku geladen sein soll. Die Rampe steigt linear vom aktuellen SoC
          auf den Ziel-SoC.
          
          ---
          
          ### Ladeschwelle / Notfall (%)
          
          **Wirkung:** Unterschreitet der Akku-SoC diesen Wert, schaltet Maestro sofort in
          die Notfallladung (emergency). In dieser Phase wird mit maximaler Ladeleistung
          geladen – unabhängig von Tarif, Korridor oder sonstigen Einschränkungen.
          
          **Empfehlung:** 15–20 %. Zu niedrig → Akku kann tiefentladen werden.
          Zu hoch → unnötige Notfallladungen tagsüber.
          
          **Standard:** 15 %
          
          ---
          
          ### Ladeende SoC (%)
          
          **Wirkung:** Der maximale SoC, der am Ende des Ladezeitfensters erreicht werden
          soll. Oberhalb dieses Werts wird der Akku nicht weiter aktiv geladen.
          
          **Empfehlung:** 90–100 %. Zur Akku-Schonung kann 90 % gesetzt werden.
          
          **Standard:** 95 %
          
          ---
          
          ### Ladeende Winter (Stunde, lokal)
          
          **Wirkung:** Uhrzeit in HA-Lokalzeit (MEZ/MESZ), zu der die Korridor-Ladung
          im Winter (Dezember) abgeschlossen sein soll. Im Winter ist morgens wenig PV
          – frühes Ladeende sichert Puffer für den Abend.
          
          **Hinweis:** Maestro arbeitet mit der Systemzeit von Home Assistant; trage
          die gewünschte Uhrzeit so ein, wie du sie auf der Wanduhr siehst.
          
          **⚠ Wechselwirkung mit Astro-Modus:** Solange der Schalter
          *Astro-Modus (Sonnenüberwachung)* aktiv ist, wird dieser Wert **vollständig
          ignoriert**. Das Ladeende kommt dann ausschließlich aus
          `Sonnenuntergang + Offset zu Sonnenuntergang`. Setze Astro auf OFF, damit
          „Ladeende Winter" und „Ladeende Sommer" tageslängenbasiert interpoliert
          werden.
          
          **Standard:** 11
          
          ---
          
          ### Ladeende Sommer (Stunde, lokal)
          
          **Wirkung:** Uhrzeit in HA-Lokalzeit, zu der das Ladeende im Sommer (Juni)
          angesetzt wird. Im Sommer lohnt es sich, die Ladung bis in den Nachmittag
          zu strecken.
          
          **⚠ Status:** Dieser Wert (`summer_maximum_hour`) wird von der aktuellen
          `decide()`-Engine **nicht ausgewertet**. Für das tatsächliche Sommer-Ladeende
          ist „Ziel-Ladeende Sommer" (`summer_charge_end`) maßgeblich. Eintrag bleibt
          aus Kompatibilität sichtbar.
          
          **Standard:** 18 (= 18:00 lokal)
          
          ---
          
          ### Ziel-Ladeende Sommer (Stunde, lokal)
          
          **Wirkung:** Wunsch-Ladeende für die Sommermonate als Startwert für die saisonale
          Interpolation. Wird durch den Astro-Modus überschrieben, wenn dieser aktiv ist.
          
          **Wechselwirkung:** Astro-Modus berechnet das Ladeende dynamisch aus dem
          Sonnenuntergang und ignoriert diesen Wert dann vollständig.
          
          **Standard:** 16
          
          ---
          
          ### Hard-SoC-Limit (Akku-Deckel)
          
          **Wirkung:** Ist der Schalter aktiv, wird das Laden ab dem eingestellten SoC-Wert
          blockiert – unabhängig von Ladeende SoC, Korridor oder Spreading. Maestro setzt
          die Ladeleistung auf 1 W (effektiv Null), lässt das Entladen aber weiter zu.
          
          **Priorität:** Greift in Phase 6.9, also **vor** dem normalen Ladekorridor.
          
          **Ausnahme – Abregelschutz:** Wenn der Curtailment Guard aktiv ist, wird das
          Hard-SoC-Limit **ignoriert**, damit sonst abgeregelte PV-Energie noch im Akku
          gepuffert wird.
          
          **Standard:** aus / 80 %
          
          ---
          
          ### Korridor-Bypass nach Ziel-Ladeende (Phase 7d)
          
          **Wirkung:** Ist die saisonale Ladeende-Stunde erreicht, der Ziel-SoC aber noch
          nicht voll, und liefert die PV weiter Strom, hebt Maestro den Korridor-Power-Cap
          auf (`charge_power_limit = Max. Ladeleistung`). Damit darf der E3DC den vollen
          PV-Surplus selbst in den Akku ziehen, statt ihn ans Netz einzuspeisen.
          
          **Hintergrund:** Im normalen Korridor cappt Maestro die Ladeleistung an der
          EWMA-geglätteten PV-Haus-Differenz. Diese Glättung läuft dem realen Surplus
          hinterher → ohne Bypass würde bei volatiler PV unnötig eingespeist. Nach dem
          Ziel-Ladeende zählt nur noch, möglichst viel PV in den Akku zu bekommen.

  - title: "Hilfe: Ladeverteilung (Spreading)"
    path: help-spreading
    subview: true
    cards:
      - type: markdown
        content: |
          ## Ladeverteilung (Spreading) – Parameter
          
          Spreading verhindert, dass Maestro den Akku sofort mit voller Leistung auf den
          Ziel-SoC lädt. Stattdessen wird die Restenergie gleichmäßig auf die verbleibende
          Zeit bis zum Ladeende verteilt.
          
          Formel:
            Soll-Rate (W) = (Ziel_SoC - akt_SoC) / 100 × Kapazität_kWh × 1000 / Restzeit_h
          
          Vorteil: Mehr Raum für PV-Spitzen, gleichmäßigere Auslastung, geringere Verluste.
          
          ---
          
          ### Spreading-Ziel SoC (%)
          
          **Wirkung:** Der SoC-Wert, bis zu dem Spreading aktiv ist. Ist der Akku-SoC
          höher als dieser Wert, ist Spreading abgeschlossen und Maestro wechselt zu einer
          anderen Phase (corridor oder idle).
          
          **Empfehlung:** Gleich dem Ladeende SoC setzen, damit Spreading den gesamten
          Ladevorgang steuert. Kann kleiner gesetzt werden, wenn die letzten Prozente
          zügig geladen werden sollen (CC/CV-Übergang des Akkus).
          
          **Standard:** entspricht Ladeende SoC (z. B. 95 %)

  - title: "Hilfe: Abregelschutz"
    path: help-curtailment
    subview: true
    cards:
      - type: markdown
        content: |
          ## Abregelschutz (Curtailment Guard) – Parameter
          
          Bei Anlagen mit Einspeisebegrenzung (z. B. 70%-Regel) oder DC-seitiger
          Überdimensionierung rechnet Maestro in jedem Zyklus einen Floor:
          
            floor_feed_in  = max(0, PV_aktuell - Hausverbrauch - Einspeisegrenze_W)
            floor_inverter = max(0, PV_aktuell - WR_Nennleistung_W)
            floor          = max(floor_feed_in, floor_inverter)
          
          Sobald floor die Einschaltschwelle überschreitet, erzwingt Maestro eine
          Mindest-Ladeleistung in genau dieser Höhe, damit keine PV-Energie abgeregelt wird.
          
          ---
          
          ### Einschaltschwelle (W)
          
          **Wirkung:** floor muss diesen Wert erreichen oder überschreiten, damit der
          Guard aktiviert wird. Höherer Wert → Guard springt seltener an, aber bei kleinen
          Abregelmengen entstehen geringe Verluste.
          
          **Empfehlung:** 1000–2000 W. Anlagen mit enger 70%-Grenze können auf 500 W senken.
          
          **Wechselwirkung:** Muss immer größer als die Ausschaltschwelle sein.
          
          **Standard:** 1500 W
          
          ---
          
          ### Ausschaltschwelle (W)
          
          **Wirkung:** floor muss unter diesen Wert fallen, damit der Guard wieder
          deaktiviert wird (Hysterese). Verhindert Flackern bei leichten PV-Schwankungen.
          
          **Empfehlung:** 300–800 W. Deutlich kleiner als die Einschaltschwelle wählen.
          
          **Standard:** 500 W

  - title: "Hilfe: Spät-Ladung (Two-Tier)"
    path: help-two-tier
    subview: true
    cards:
      - type: markdown
        content: |
          ## Spät-Ladung (Two-Tier) – Parameter
          
          Two-Tier ergänzt den normalen Ladekorridor um ein zweites Ladefenster am Abend.
          Nach dem regulären Ladeende lädt der Akku weiter bis zu einem zweiten, höheren
          Ziel-SoC.
          
          Typischer Anwendungsfall: Im Winter den Akku nachmittags auf 80 % bringen
          (Korridor), dann abends mit günstiger Netzenergie noch auf 100 % aufladen.
          
          ---
          
          ### Spätziel SoC (%)
          
          **Wirkung:** Der Ziel-SoC des zweiten Ladefensters. Liegt dieser Wert über dem
          normalen Ladeende SoC, wird nach Erreichen des ersten Ziels weiter geladen.
          
          **Empfehlung:** 95–100 %. Unter dem Ladeende SoC ist Two-Tier wirkungslos.
          
          **Standard:** 100 %
          
          ---
          
          ### Spät-Ladeende (Stunde, lokal)
          
          **Wirkung:** Uhrzeit in HA-Lokalzeit, zu der das zweite Ladefenster endet.
          Nach dieser Zeit stoppt Maestro die aktive Ladung auch wenn der Spätziel-SoC
          nicht erreicht wurde.
          
          **Standard:** 20

  - title: "Hilfe: PV-Verzögerung & Vorausschauende Ladung"
    path: help-pv-delay
    subview: true
    cards:
      - type: markdown
        content: |
          ## PV-Verzögerung & Vorausschauende Ladung
          
          Maestro verschiebt die Akku-Ladung in Stunden mit guter PV-Prognose so weit
          nach hinten, dass die Batterie möglichst aus eigener PV statt aus dem Netz
          gefüllt wird. Das spart Netzbezug und maximiert den Eigenverbrauch.
          
          Die Phase heißt im Cockpit **„PV-Verzögerung"** (`pv_delay`).
          
          ---
          
          ### Vorausschauende Ladung aktiv
          
          **Wirkung:** Master-Schalter für die Verzögerung. Aus = Maestro lädt nach
          Standard-Korridor; an = Ladung darf bei guter Prognose verschoben werden.
          
          **Empfehlung:** Im Sommer/Frühling/Herbst aktiv lassen, im tiefen Winter
          optional deaktivieren, falls die Prognose unzuverlässig ist.
          
          ---
          
          ### Mindest-SoC vor Verzögerung (%)
          
          **Wirkung:** Untergrenze. Solange der SoC unter diesem Wert liegt, wird die
          Ladung **nicht** verzögert – egal wie gut die PV-Prognose ist. Schützt vor
          unerwarteten Verbrauchsspitzen am Vormittag.
          
          **Empfehlung:** 20–40 %. Bei großem Verbrauch oder unzuverlässiger Prognose
          höher.
          
          **Standard:** 0 % (Floor deaktiviert – altes Verhalten)
          
          ---
          
          ### PV-Forecast Schwelle (kWh)
          
          **Wirkung:** Mindest-Restprognose des PV-Tagesertrags, ab der Maestro die
          Ladung überhaupt verzögern darf. Liegt die Resterzeugung darunter, wird
          sofort geladen, weil zu wenig PV erwartet wird.
          
          **Empfehlung:** Etwa 50–80 % des typischen Tagesbedarfs. Standardwert
          funktioniert für die meisten Haushalte.
          
          **Standard:** 5,0 kWh
          
          ---
          
          ### PV-Forecast Sicherheitsfaktor
          
          **Wirkung:** Multiplikator auf die benötigte Energie. Maestro verzögert nur,
          wenn die Prognose mindestens **(benötigte kWh × Faktor)** liefert. Höhere
          Werte = vorsichtiger (mehr Netzladung, weniger Risiko, dass die Batterie
          bei plötzlich schlechter werdender Sonne nicht voll wird).
          
          **Empfehlung:** 1,1–1,3. Bei sehr volatiler Wetterlage 1,3–1,5.
          
          **Standard:** 1,2

  - title: "Hilfe: Schwacher-PV-Tag (Akku-Priorität)"
    path: help-low-yield
    subview: true
    cards:
      - type: markdown
        content: |
          ## Schwacher-PV-Tag – Akku-Priorität
          
          An stark bewölkten Tagen reicht die PV oft knapp für den Hausverbrauch **und**
          einen vollen Akku. Ohne Anpassung drosselt Maestro im Korridor/Spreading die
          Ladeleistung und speist Überschuss ins Netz ein – der Akku bleibt am Abend
          unter dem Ziel.
          
          **Schwacher-PV-Tag** erkennt solche Tage früh (Solcast-Tagesprognose) und
          schaltet auf **Überschuss-Priorität** um: Der Akku bekommt den verfügbaren
          PV-Überschuss, bevor exportiert wird.
          
          ---
          
          ### Voraussetzung: Prognose-Sensor
          
          In den **Integrations-Optionen** von E3DC Maestro muss der Sensor
          **„Prognose heute – Tagessumme kWh“** gesetzt sein (z. B.
          `sensor.solcast_pv_forecast_prognose_heute`). Ohne diesen Sensor bleiben
          die Diagnose-Sensoren auf *unknown* und die Erkennung ist deaktiviert.
          
          ---
          
          ### Erkennungslogik
          
          ```
          Quote = Tagesprognose (kWh) ÷ Referenz-Ertrag (kWh)
          Schwacher Tag ⇔ Quote ≤ Schwelle
          ```
          
          **Referenz-Ertrag** = Maximum aus:
          1. Manueller Referenzwert (wenn > 0)
          2. Installierte kWp × Faktor (kWh/kWp)
          3. Historischer Peak aus der PV-Statistik
          
          Die Erkennung wird **einmal pro Kalendertag** festgehalten (Latch), damit eine
          nachmittäglich bessere Solcast-Prognose die Strategie nicht hin- und herschaltet.
          
          ---
          
          ### Schwacher-PV-Tag Priorität aktiv
          
          **Wirkung:** Master-Schalter. Aus = normales Korridor/Spreading-Verhalten.
          
          **Empfehlung:** Aktiv lassen, wenn Solcast-Tagesprognose zuverlässig ist.
          
          **Standard:** an
          
          ---
          
          ### Schwelle (Anteil 0–1)
          
          **Wirkung:** Unterhalb dieses Anteils gilt der Tag als „schwach“. Beispiel:
          Schwelle 0,5 + Referenz 100 kWh → ab ≤ 50 kWh Prognose wird priorisiert.
          
          **Empfehlung:** 0,45–0,55. Grenzfälle (wie 52 % bei 0,5 Schwelle) können
          bewusst über die Schwelle ein- oder ausgeschlossen werden.
          
          **Standard:** 0,5
          
          ---
          
          ### PV-Referenz manuell (kWh, 0 = automatisch)
          
          **Wirkung:** Optionaler fester Referenzwert für sehr sonnige Tage. 0 = automatisch
          aus kWp × Faktor und PV-Statistik-Peak.
          
          **Empfehlung:** 0 lassen, außer die automatische Referenz passt nicht zur Anlage.
          
          **Standard:** 0
          
          ---
          
          ### PV-Referenz Faktor (kWh/kWp)
          
          **Wirkung:** kWp-Baseline für den Referenztag. 5,5 kWh/kWp entspricht einem
          sehr sonnigen Sommertag (z. B. 19 kWp → ~105 kWh).
          
          **Empfehlung:** 5,0–6,0 je nach Region und Neigungswinkel.
          
          **Standard:** 5,5
          
          ---
          
          ### Verhalten im Korridor (wenn erkannt)
          
          | Normal | Schwacher-PV-Tag |
          |---|---|
          | SoC-Rampe begrenzt Ladeleistung | Voller PV-Überschuss (PV − Haus) |
          | Spreading drosselt auf Restzeit-Rate | Spreading aus |
          | Korridor-Pause bei kleinem Überschuss | Pause umgangen |
          
          In der Entscheidungserklärung erscheint der Zusatz
          **`[Schwacher-PV-Tag: Überschuss-Priorität]`**.
          
          ---
          
          ### Abgrenzung zu PV-Verzögerung
          
          | Feature | Zweck |
          |---|---|
          | **PV-Verzögerung** | Bei *guter* Prognose Ladung *verschieben* |
          | **Schwacher-PV-Tag** | Bei *schlechter* Prognose Akku *sofort* füllen |
          
          Beide können parallel aktiv sein – sie wirken in entgegengesetzten Situationen.

  - title: "Hilfe: Astro-Modus"
    path: help-astro
    subview: true
    cards:
      - type: markdown
        content: |
          ## Astro-Modus – Parameter
          
          Im Astro-Modus berechnet Maestro das Ladeende und den Ladestart täglich neu auf
          Basis der Sonnenuntergangs- und Sonnenaufgangszeiten am Standort.
          Der Standort wird automatisch aus den Home Assistant Systemeinstellungen übernommen.
          
          Vorteil: Im Sommer verschiebt sich das Ladeende automatisch nach hinten (mehr PV),
          im Winter nach vorne – ohne manuelle Anpassung.
          
          ---
          
          ### Offset zu Sonnenuntergang (h)
          
          **Wirkung:** Wie viele Stunden vor dem Sonnenuntergang das Ladeende angesetzt
          wird. Positiver Wert = Ladeende liegt vor Sonnenuntergang.
          
          Beispiel: Offset = 2, Sonnenuntergang 20:30 → Ladeende 18:30.
          
          **Empfehlung:** 1–3 h. Größerer Wert = konservativerer Puffer für den Abend.
          Zu groß → Akku wird früh voll, PV-Spitzen am Nachmittag gehen verloren.
          
          **Wechselwirkung:** Überschreibt Ladeende Winter und Ladeende Sommer vollständig,
          solange Astro-Modus aktiv ist.
          
          **Standard:** 2 h
          
          ---
          
          ### Offset nach Sonnenaufgang (h)
          
          **Wirkung:** Wie viele Stunden nach dem Sonnenaufgang der Ladestart frühestens
          erlaubt ist. Verhindert, dass Maestro kurz nach Mitternacht lädt.
          
          Beispiel: Offset = 1, Sonnenaufgang 05:45 → Ladestart frühestens 06:45.
          
          **Empfehlung:** 0.5–2 h. Notfallladungen (emergency) greifen trotzdem früher ein.
          
          **Standard:** 1 h

  - title: "Hilfe: HT/NT-Schutz"
    path: help-ht
    subview: true
    cards:
      - type: markdown
        content: |
          ## Hochtarif-Schutz – Parameter
          
          Der HT-Schutz verhindert, dass Maestro den Akku im Hochtarif-Fenster entlädt
          (Phase ht_protection). Gleichzeitig hält er eine saisonal variable Mindest-Reserve.
          
          **Wichtig:** Alle Zeitangaben werden in der HA-Lokalzeit ausgewertet
          (Europe/Berlin → automatisch MEZ im Winter / MESZ im Sommer). Trage die
          Uhrzeit so ein, wie du sie auf der Wanduhr siehst.
          
          ---
          
          ### HT Beginn (Stunde, lokal)
          
          **Wirkung:** Beginn des Hochtarif-Fensters als Stunde in HA-Lokalzeit.
          
          Beispiel: 6 → 06:00 Uhr lokal (egal ob Winter- oder Sommerzeit).
          
          **Standard:** 6
          
          ---
          
          ### HT Ende (Stunde, lokal)
          
          **Wirkung:** Ende des Hochtarif-Fensters als Stunde in HA-Lokalzeit.
          
          Beispiel: 21 → 21:00 Uhr lokal.
          
          **Standard:** 21
          
          ---
          
          ### HT-Reserve Winter (%)
          
          **Wirkung:** Minimaler SoC, den Maestro während des HT-Fensters im Winter
          (Dezember) schützt. Der Akku wird nicht unter diesen Wert entladen.
          
          **Empfehlung:** 20–40 %. Höher = mehr Puffer für Abendverbrauch, aber weniger
          Spielraum für Vorentladung.
          
          **Standard:** 30 %
          
          ---
          
          ### HT-Reserve Äquinoktium (%)
          
          **Wirkung:** Minimaler SoC zur Tagundnachtgleiche (ca. 21. März / 23. September).
          Maestro interpoliert **tageslängenbasiert** (astrobasiert) zwischen Winter- und Äquinoktiumswert.
          Im Sommer (längster Tag) liegt die Reserve nahe 0 %.
          
          **Empfehlung:** 10–20 %. Kleiner als der Winterwert.
          
          **Standard:** 15 %

  - title: "Hilfe: Dynamischer Tarif"
    path: help-tarif
    subview: true
    cards:
      - type: markdown
        content: |
          ## Dynamischer Tarif – Parameter
          
          Maestro kann bei einem dynamischen Stromtarif (z. B. Tibber, aWATTar) günstige
          Stunden nutzen, um den Akku aus dem Netz zu laden. Zwei Parameter begrenzen
          das Risiko ungewollt hoher Bezugskosten.
          
          ---
          
          ### Günstig-Schwelle (€/kWh)
          
          **Wirkung:** Liegt der aktuelle Spotpreis unter diesem Wert, gilt die Stunde als
          günstig und Netzladung wird grundsätzlich freigegeben – sofern das Tageslimit
          noch nicht erreicht ist.
          
          **Empfehlung:** 0.05–0.15 €/kWh. Zu hoch → Maestro lädt auch bei teuren Preisen.
          Zu niedrig → Günstigstunden werden nie erkannt.
          
          **Wechselwirkung:** Wirkt nur, wenn ein Preissensor in HA verfügbar und
          mit Maestro verknüpft ist.
          
          **Standard:** 0.10 €/kWh
          
          ---
          
          ### Max. Netzladung/Tag (kWh)
          
          **Wirkung:** Maximale Energiemenge in kWh, die Maestro pro Kalendertag aus dem
          Netz laden darf – auch wenn der Preis günstig ist. Verhindert unbeabsichtigt
          hohe Netzbezugskosten an Tagen mit vielen Günstigstunden.
          
          **Empfehlung:** 5–15 kWh je nach Akkugröße. Für 11 kWh Akku typisch 8–10 kWh.
          
          **Standard:** 10 kWh

  - title: "Hilfe: Wallbox-Überschussregelung"
    path: help-wallbox
    subview: true
    cards:
      - type: markdown
        content: |
          ## Wallbox-Überschussregelung – Parameter
          
          Maestro steuert den Ladestrom der Wallbox in Abstimmung mit dem PV-Überschuss.
          Die Parameter begrenzen den Betriebsbereich und schützen vor ungültigen Befehlen.
          
          > Diese Funktion ist **unabhängig von der EVCC-Akku-Entladesperre**. Beide
          > Schalter können separat aktiviert werden.
          
          > **Verbrauchstrennung (seit v0.3.1):** Wird im Konfigurations-Wizard ein
          > **Wallbox-Powersensor** hinterlegt (E3DC-RSCP-Wallbox oder
          > `sensor.openwb_chargepoint_*_ladeleistung`), trennt Maestro den
          > EV-Verbrauch sauber vom Hausverbrauch ab — EWMA-Glättung, PV-Forecast und
          > Optimizer werden nicht mehr durch Ladespitzen verfälscht. Sichtbar über
          > `sensor.e3dc_maestro_wallbox_leistung` und
          > `sensor.e3dc_maestro_gesamtlast_leistung`. Diese Trennung greift auch
          > **ohne** aktive Wallbox-Regelung.
          
          ---
          
          ### Min-Strom (A)
          
          **Wirkung:** Minimaler Ladestrom in Ampere. Fällt der berechnete Sollstrom darunter,
          stoppt Maestro die Wallbox vollständig.
          
          **Empfehlung:** 6 A (IEC-61851-Minimum). Manche Fahrzeuge erst ab 8 A.
          
          **Standard:** 6 A
          
          ---
          
          ### Max-Strom (A)
          
          **Wirkung:** Maximaler Ladestrom, auf den Maestro die Wallbox begrenzt. Darf nicht
          größer als das physische Maximum der Wallbox oder des Fahrzeugs sein.
          
          **Empfehlung:** Hausanschluss-Limit und Wallbox-Maximum beachten. Typisch 16 A
          (einphasig) oder 11/22 A (dreiphasig).
          
          **Standard:** 16 A
          
          ---
          
          ### Mindest-Überschuss (W)
          
          **Wirkung:** PV-Überschuss in Watt, ab dem Maestro die Wallbox einschaltet.
          Unterschreitet der Überschuss diesen Wert, pausiert die Wallbox.
          
          **Empfehlung:** 6 A × 230 V ≈ 1380 W (einphasig). Verhindert Netzladung.
          
          **Standard:** 1380 W

  - title: "Hilfe: EVCC – Akku-Entladesperre"
    path: help-evcc
    subview: true
    cards:
      - type: markdown
        content: |
          ## EVCC – Akku-Entladesperre bei Sofortladen
          
          Diese Funktion ist **unabhängig von der Wallbox-Überschussregelung**. Sie schützt
          ausschließlich den Hausakku, wenn das Auto über EVCC/OpenWB im Sofortlade-Modus
          geladen wird, und verhindert, dass das Fahrzeug den Akku leerzieht.
          
          Maestro greift nur ein, wenn **beide** Bedingungen gleichzeitig erfüllt sind:
          
          1. Der konfigurierte EVCC-Lädt-Sensor meldet `on/true` (das Auto zieht tatsächlich Strom)
          2. Der EVCC-Modus-Sensor steht auf dem konfigurierten Now-Wert (z. B. `now` bzw. `Instant Charging`)
          
          Sobald **eine** der Bedingungen wegfällt, wird das Limit automatisch aufgehoben
          und Maestro fährt seinen normalen Regelbetrieb weiter.
          
          ---
          
          ### EVCC-Integration aktiv
          
          **Master-Schalter** der Funktion. Aus → keine Sperre, Maestro ignoriert EVCC
          vollständig.
          
          Die zugehörigen Sensoren (Lädt-Sensor, Modus-Sensor, Now-Wert) werden im
          Konfigurations-Wizard der Integration gesetzt.
          
          ---
          
          ### Akku-Entladungslimit im Now-Modus (W)
          
          **Wirkung:** Maximale Akku-Entladeleistung, solange EVCC im Sofortlade-Modus lädt.
          
          - **`0` W (Standard):** Akku-Entladung wird komplett gesperrt — das Auto zieht
            nur aus PV und Netz, der Akku bleibt auf seinem aktuellen SoC.
          - **`> 0` W (z. B. `500`):** Erlaubt einen Grundlastwert. Der Akku darf bis zu
            diesem Wert entladen werden, um den Hausbedarf zu decken; das Auto greift
            nicht darüber hinaus auf den Akku zu.
          
          **Hinweis:** Manche E3DC-Modelle erzwingen eine system-definierte Mindest-
          Entladerate, die nicht unterschritten werden kann. Falls die Vollsperre (`0` W)
          in deinem System nicht greift, setze einen kleinen Grundlastwert (z. B. `100` W).
          
          **Standard:** 0 W

  - title: "Hilfe: Wärmepumpe"
    path: help-wp
    subview: true
    cards:
      - type: markdown
        content: |
          ## Wärmepumpe – Parameter
          
          Maestro kann eine Wärmepumpe als flexible Last steuern: bei PV-Überschuss
          einschalten, bei Mangel pausieren. Die Mindestlaufzeit und -pause schützen den
          Verdichter vor zu häufigem Schalten.
          
          ---
          
          ### Mindest-Überschuss (W)
          
          **Wirkung:** PV-Überschuss, ab dem Maestro die Wärmepumpe freigibt. Unterschreitet
          der Überschuss diesen Wert, stoppt Maestro die WP (nach Ablauf der Mindestlaufzeit).
          
          **Standard:** 1000 W
          
          ---
          
          ### Max-Preis (€/kWh)
          
          **Wirkung:** Maximaler Strompreis, bis zu dem die WP auch bei zu wenig PV-Überschuss
          eingeschaltet bleibt (z. B. günstiger Nachtstrom für Heizung). Nur wirksam bei
          vorhandenem Preissensor.
          
          **Empfehlung:** 0.00–0.10 €/kWh. 0.00 → WP läuft nur bei PV-Überschuss.
          
          **Standard:** 0.05 €/kWh
          
          ---
          
          ### Mindestlaufzeit (min)
          
          **Wirkung:** Mindestlaufzeit in Minuten, bevor die WP nach dem Einschalten wieder
          gestoppt werden darf. Verhindert häufiges Takten (Kompressorschutz).
          
          **Standard:** 20 min
          
          ---
          
          ### Mindestpause (min)
          
          **Wirkung:** Mindestpause in Minuten nach dem Stopp, bevor die WP erneut starten
          darf. Schützt den Anlaufkondensator und den Verdichter vor Überhitzung.
          
          **Standard:** 10 min

  - title: "Hilfe: Morgen-Vorentladung"
    path: help-vorentladung
    subview: true
    cards:
      - type: markdown
        content: |
          ## Morgen-Vorentladung – Parameter
          
          Die Vorentladung (Phase 6) entlädt den Akku kurz vor dem erwarteten Ladestart
          aktiv auf einen niedrigen SoC. Dadurch steht am nächsten Morgen mehr Kapazität
          für den PV-Ertrag zur Verfügung.
          
          Typischer Anwendungsfall: Im Winter den Akku abends auf 30 % entladen, damit er
          am nächsten Tag komplett mit PV aufgeladen werden kann.
          
          ---
          
          ### Vorentladungs-Modus
          
          **Optionen:**
          - **off** – Vorentladung deaktiviert.
          - **fixed_time** – Startet täglich zur fixen Offsetzeit (Ladestart minus Offset).
          - **tibber_auto** – Exportiert Energie, wenn Tibber-Preis über der Netzexport-Schwelle
            liegt (günstige Abnahmezeiten für Versorger nutzen).
          
          **Standard:** off
          
          ---
          
          ### Entlade-Ziel SoC (%)
          
          **Wirkung:** SoC-Ziel nach der Vorentladung. Maestro entlädt bis zu diesem Wert.
          
          **Empfehlung:** 20–40 %. Die Notstromreserve hat immer Vorrang und begrenzt
          die Vorentladung nach unten.
          
          **Standard:** 30 %
          
          ---
          
          ### Einschalt-Schwelle SoC (%)
          
          **Wirkung:** Vorentladung wird nur gestartet, wenn der aktuelle SoC über diesem
          Wert liegt. Ist der Akku schon leer, macht eine Vorentladung keinen Sinn.
          
          **Empfehlung:** 40–60 %. Muss über dem Entlade-Ziel SoC liegen.
          
          **Standard:** 50 %
          
          ---
          
          ### Offset vor Ladestart (h)
          
          **Wirkung:** Wie viele Stunden vor dem berechneten Ladestart die Vorentladung
          beginnt.
          
          Beispiel: Ladestart 07:00, Offset 2 h → Vorentladung startet um 05:00.
          
          **Standard:** 2 h
          
          ---
          
          ### Max. Entladeleistung (W)
          
          **Wirkung:** Maximale Entladeleistung während der Vorentladung in Watt. Begrenzt
          die Netzeinspeisung und schont den Akku bei langen Vorentladungs-Phasen.
          
          **Standard:** 3000 W
          
          ---
          
          ### Netzexport-Schwelle (€/kWh) – Tibber-Auto
          
          **Wirkung:** Im Tibber-Auto-Modus entlädt Maestro nur, wenn der aktuelle
          Tibber-Preis über diesem Wert liegt – zu teuren Stunden, in denen Einspeisung
          besonders lukrativ ist.
          
          **Empfehlung:** 0.20–0.35 €/kWh. Zu niedrig → Akku wird auch bei normalen
          Preisen entladen.
          
          **Standard:** 0.25 €/kWh

  - title: "Hilfe: Hardware-Parameter"
    path: help-hardware
    subview: true
    cards:
      - type: markdown
        content: |
          ## Hardware – Parameter
          
          Diese Werte beschreiben die physische Anlage. Falsche Angaben führen zu
          fehlerhaften Curtailment-Guard-Berechnungen und falschen Einspeiselimits.
          
          ---
          
          ### WR-Nennleistung (W)
          
          **Wirkung:** AC-seitige Nennleistung des Wechselrichters. Maestro nutzt diesen
          Wert für den Curtailment-Guard-Floor:
          
            floor_inverter = max(0, PV_aktuell - WR_Nennleistung)
          
          **Standard:** 10000 W (typisch E3DC S10 E)
          
          ---
          
          ### Installierte PV (kWp)
          
          **Wirkung:** Installierte PV-Nennleistung in kWp. Wird für Berechnungskontext
          und Logging verwendet.
          
          **Standard:** je nach Anlage (z. B. 12.0 kWp)
          
          ---
          
          ### Max. Ladeleistung (W)
          
          **Wirkung:** Maximale Ladeleistung, auf die Maestro den Akku begrenzt.
          Muss kleiner oder gleich dem physischen Akkumaximum sein.
          
          **Empfehlung:** Nicht über das Akku-Datenblattmaximum setzen.
          Typisch 4500 W für einen E3DC 9,6 kWh Akku.
          
          **Standard:** 4500 W
          
          ---
          
          ### Min. Ladeleistung (W)
          
          **Wirkung:** Minimale Ladeleistung, unter die Maestro nicht geht. Verhindert
          Kriechladung und Wechselrichter-Instabilitäten bei zu geringen Regelwerten.
          
          **Standard:** 200 W
          
          ---
          
          ### Einspeisegrenze (%)
          
          **Wirkung:** Maximale Netzeinspeisung als Prozent der installierten PV-Leistung.
          Für die gesetzliche 70%-Regel: Wert = 70.
          
          Maestro berechnet daraus:
            Einspeisegrenze_W = Einspeisegrenze% / 100 × installierte_PV_kWp × 1000
            floor_feed_in     = max(0, PV - Verbrauch - Einspeisegrenze_W)
          
          **Standard:** 70 (%)

  - title: "Hilfe: Steuerverhalten"
    path: help-steuerverhalten
    subview: true
    cards:
      - type: markdown
        content: |
          ## Steuerverhalten – Parameter
          
          Diese Parameter steuern die Stabilitätsmechanismen des Regelzyklus. Zu kleine
          Werte führen zu Flackern, zu große zu träger Reaktion.
          
          ---
          
          ### SoC-Hysterese (%)
          
          **Wirkung:** Prozentualer Puffer um SoC-Schwellen, um Flackern zu vermeiden.
          Beispiel: Ladeende SoC = 95 %, Hysterese = 2 % → Maestro stoppt bei 95 %,
          startet erst wieder bei < 93 %.
          
          **Empfehlung:** 1–3 %. Zu groß → SoC-Schwellen werden ungenau eingehalten.
          
          **Standard:** 2 %
          
          ---
          
          ### Ladeleistungs-Anlauf (W/Zyklus)
          
          **Wirkung:** Maximale Änderung der Ladeleistung pro Regelzyklus in Watt.
          Verhindert abrupte Leistungssprünge, die den Wechselrichter destabilisieren.
          
          Beispiel: Anlauf = 200 W, Zyklus = 30 s → 200 W alle 30 s bis zur Sollleistung.
          
          **Empfehlung:** 100–500 W. Zu groß → ruckartige Regelung.
          
          **Standard:** 200 W/Zyklus
          
          ---
          
          ### Aktualisierungsintervall (s)
          
          **Wirkung:** Zeitabstand zwischen zwei Regelzyklen in Sekunden.
          Kürzeres Intervall = reaktionsschnellere Regelung, aber höhere Last auf HA und E3DC.
          
          **Empfehlung:** 20–60 s. Unter 15 s kann die E3DC-Modbus-Verbindung überlastet werden.
          
          **Standard:** 30 s
          
          ---
          
          ### Watchdog-Timeout (min)
          
          **Wirkung:** Wenn Maestro für diese Zeitspanne keine Daten von HA erhält
          (z. B. HA-Neustart), wechselt es in einen sicheren Standby-Modus und
          setzt die Ladeleistung auf 0 W.
          
          **Empfehlung:** 5–15 min. Zu kurz → Fehlalarm bei kurzen HA-Pausen.
          
          **Standard:** 10 min
          
          ---
          
          ### Soll- vs. Gesendet-Lade-Limit
          
          Maestro berechnet pro Zyklus ein **Soll-Lade-Limit** (interne Regelung).
          Nur wenn sich der Wert genug vom zuletzt an die E3DC gesendeten Cap
          unterscheidet (Debounce ≥ 50 W), wird ein neuer Befehl übertragen.
          
          - **Soll-Lade-Limit** (`sensor.e3dc_maestro_aktives_lade_limit`):
            Was Maestro gerade anstrebt (inkl. Anlauf-Rampe).
          - **Gesendetes Lade-Limit** (`sensor.e3dc_maestro_gesendetes_lade_limit`):
            Was tatsächlich per e3dc_rscp an die Hardware ging.
          
          Weichen Soll und Gesendet dauerhaft auseinander (z. B. Soll 2 kW,
          Gesendet 51 W), hängt die E3DC am alten Cap — genau der Bug, den
          v0.3.11 behoben hat. Orange Markierung im Dashboard signalisiert
          eine Drift > 50 W.
          
          **Entlade-Limit:** Ist kein explizites Cap gesetzt (Entladung frei),
          sendet Maestro ``max_discharge = Max. Ladeleistung`` (nicht
          WR-Nennleistung). Die WR-Nennleistung kann höher sein als die
          tatsächliche Akku-Grenze (z. B. 18 kW WR vs. 9 kW Akku).

  - title: "Hilfe: Notstromreserve"
    path: help-notstromreserve
    subview: true
    cards:
      - type: markdown
        content: |
          ## Notstromreserve – Parameter
          
          Die Notstromreserve schützt einen Mindest-SoC im Akku für den Fall eines
          Netzausfalls. Maestro entlädt den Akku nie unter diesen Wert, solange die
          Reserve aktiv ist.
          
          Die Reserve wird **tageslängenbasiert** (astrobasiert) zwischen dem Winterwert
          (kürzester Tag) und dem Äquinoktiumswert (Tagundnachtgleiche) interpoliert und
          sinkt im Sommer (längster Tag) weiter auf nahe 0 %. Der Breitengrad wird
          automatisch aus den HA-Systemeinstellungen übernommen.
          
          ---
          
          ### Reserve Winter (%)
          
          **Wirkung:** Minimaler SoC in den Wintermonaten (Dezember). Maestro verhindert
          Entladung unter diesen Wert.
          
          **Empfehlung:** 15–30 %. Je mehr Verbrauch im Notfall (Heizung, Licht), desto höher.
          
          **Wechselwirkung:** Muss größer oder gleich dem Äquinoktiumswert sein, sonst ist
          die Interpolation invertiert.
          
          **Standard:** 20 %
          
          ---
          
          ### Reserve Äquinoktium (%)
          
          **Wirkung:** Minimaler SoC zur Tagundnachtgleiche (ca. 21. März / 23. September).
          Die Reserve fällt von diesem Wert zu den Sommermonaten hin weiter ab.
          
          **Empfehlung:** 5–15 %. Im Sommer ist ausreichend PV für schnelle Nachladung
          vorhanden.
          
          **Standard:** 10 %

  - title: "Hilfe: Tarif-Slots"
    path: help-tariff-slots
    subview: true
    cards:
      - type: markdown
        content: |
          ## Tarif-Slots – Konfiguration
          
          Der Tarif-Slot-Scheduler ersetzt die fixen HT/NT-Felder durch eine flexible Liste
          von Tarif-Fenstern. Jeder Slot definiert ein Zeitfenster mit Wochentagen, Start-
          und Endzeit sowie einer Klasse, die das Regelverhalten bestimmt.
          
          **Konfigurationsort:** *Einstellungen → Integrationen → E3DC Maestro →
          Konfigurieren → Tarif-Slots*
          
          ---
          
          ### Klassen
          
          | Klasse | Wirkung |
          |--------|---------|
          | **high** | Kein Entladen – HT-Schutz aktiv |
          | **low** | Netzladung erlaubt – günstige Stunden nutzen |
          | **normal** | Neutral – Maestro entscheidet nach Standardlogik |
          
          ---
          
          ### Wochentage
          
          Slots können gezielt für Werktage (Mo–Fr), Samstag, Sonntag oder beliebige
          Kombinationen konfiguriert werden.
          
          Beispiel typische Konfiguration für Haushaltsstrom:
          - Slot 1: Mo–Fr 06:00–21:00 Uhr, Klasse `high` (Haupttarif)
          - Slot 2: Sa–So 08:00–20:00 Uhr, Klasse `high` (Wochenend-Tarif)
          
          ---
          
          ### Mindest-SoC-Reserve im Slot
          
          Optionale Reserve, die nur innerhalb dieses Slots gilt – zusätzlich zur
          saisonalen Notstromreserve. Nützlich z. B. für Abend-Spitzenlast.
          
          ---
          
          ### Verhältnis zu Legacy-HT-Feldern
          
          Die alten Felder `HT Beginn`, `HT Ende`, `HT-Reserve Winter/Äquinoktium` und die
          HT-Switches bleiben als schnelle Grundkonfiguration erhalten und werden weiterhin
          berücksichtigt, wenn keine Tarif-Slots definiert sind. Tarif-Slots haben Vorrang.

  - title: "Hilfe: Adaptive Reserve"
    path: help-adaptive-reserve
    subview: true
    cards:
      - type: markdown
        content: |
          ## Adaptive Reserve – Parameter
          
          Die adaptive Reserve berechnet den benötigten Mindest-SoC automatisch aus dem
          rollenden Verbrauchsmittelwert der letzten Tage – statt statische Winter/Sommer-
          Werte zu verwenden.
          
          **Standardmäßig deaktiviert.** Bei Aktivierung läuft parallel zur statischen
          Reserve; der höhere Wert gilt.
          
          **Konfigurationsort:** *Einstellungen → Integrationen → E3DC Maestro →
          Konfigurieren → Adaptive Reserve*
          
          ---
          
          ### Adaptive Reserve aktivieren
          
          **Wirkung:** Schalter, der die verbrauchsadaptive Reserve ein-/ausschaltet.
          Bei Deaktivierung gelten ausschließlich die statischen Saisonwerte.
          
          ---
          
          ### Lookback-Tage
          
          **Wirkung:** Wie viele Tage Verbrauchshistorie für die Mittelwertbildung
          herangezogen werden. Längerer Zeitraum = stabilere Reserve, aber langsamer
          anpassend an geänderte Verbrauchsgewohnheiten.
          
          **Empfehlung:** 7–21 Tage. Standard: 14 Tage.
          
          ---
          
          ### Mindestdaten (Tage)
          
          **Wirkung:** Mindestanzahl Tage mit Daten, bevor die adaptive Reserve wirkt.
          Darunter gilt der statische Fallback.
          
          **Standard:** 7 Tage.
          
          ---
          
          ### Sicherheitsfaktor
          
          **Wirkung:** Multiplikator auf die berechnete Reserve. Wert > 1.0 erhöht den
          Puffer für Verbrauchsspitzen.
          
          Beispiel: Berechnete Reserve = 20 %, Faktor 1.3 → aktive Reserve = 26 %.
          
          **Empfehlung:** 1.2–1.5. Zu hoch → Akku steht für Optimierung weniger zur Verfügung.
          
          **Standard:** 1.3
          
          ---
          
          ### Max. SoC-Deckel (%)
          
          **Wirkung:** Obergrenze für die berechnete adaptive Reserve. Verhindert,
          dass die Formel bei hohem Durchschnittsverbrauch oder kleiner Batterie
          die Reserve auf unrealistisch hohe Werte treibt und damit das normale
          Entladen blockiert.
          
          Beispiel: 600 W × 24 h × 1.3 ÷ 10 kWh = 187 % → ohne Deckel würde die
          Reserve den gesamten Akku reservieren. Mit Deckel 35 % bleiben mindestens
          65 % nutzbar.
          
          **Empfehlung:** 25–40 %. Höhere Werte nur bei sehr großen Batterien
          und/oder hohem Sicherheitsbedürfnis.
          
          **Standard:** 35 %
          
          ---
          
          ### Sensoren
          
          - **Notstromreserve (adaptiv):** Berechnete adaptive Reserve für Notstromschutz.
          - **HT-Reserve (adaptiv):** Berechnete adaptive Reserve für das HT-Fenster.
          
          Beide Sensoren sind standardmäßig in der HA Entitäts-Registry deaktiviert und
          müssen dort manuell aktiviert werden, um im Dashboard zu erscheinen.

  - title: "Hilfe: Morning-Cap & Schonladung"
    path: help-flat-curve
    subview: true
    cards:
      - type: markdown
        content: |
          ## Morning-Cap & Schonladung
          
          Diese Features glätten das Lade-/Entlade-Profil des Akkus und verlängern
          die Lebensdauer durch schonendere Nutzung.
          
          ---
          
          ### Morning-Cap aktivieren
          
          **Wirkung:** Hält den SoC bis zur eingestellten Uhrzeit (lokal) unterhalb der
          SoC-Grenze. Wenn der Akku bereits voll genug ist (≥ SoC-Grenze), wird keine
          weitere Ladung initiiert – der Akku bleibt für die Nacht-zu-Morgen-Phase
          "leer" genug, um überschüssige PV im Tagesverlauf effizient aufzunehmen.
          
          **Typisches Szenario:** Nachts laden auf Mindest-SoC (z.B. Notstromreserve),
          aber nicht auf 80 %. Dann morgens mit PV den Rest laden.
          
          **Ausnahmen:** Curtailment Guard (Abregelschutz) überschreibt den Morning-Cap
          immer, damit keine Energie verloren geht.
          
          ---
          
          ### SoC-Deckel (%)
          
          **Wirkung:** Obergrenze für den Morning-Cap. Liegt der aktuelle SoC bei oder
          über diesem Wert und ist die Uhrzeit vor dem "Aktiv bis"-Wert, wird keine
          weitere Ladung zugelassen.
          
          **Empfehlung:** 20–40 % – so bleibt tagsüber ausreichend Puffer für PV.
          
          **Standard:** 30 %
          
          ---
          
          ### Aktiv bis (Uhr, lokal)
          
          **Wirkung:** Bis zu dieser Uhrzeit (HA-Lokalzeit) ist der Morning-Cap aktiv.
          Danach greift der normale Ladekorridor.
          
          **Empfehlung:** 9–11 Uhr lokal (vor der Mittags-PV-Spitze).
          
          **Standard:** 10 Uhr lokal
          
          ---
          
          ### Schonladung aktivieren
          
          **Wirkung:** Reduziert die maximale Ladeleistung auf den eingestellten Faktor.
          Schützt die Batterie vor schneller Vollladung (High-Rate-Stress).
          
          **Ausnahmen:** Curtailment Guard, Notfall-Ladung und Einspeisedrosselung
          laden immer mit voller Leistung – Schonladung wird dort ignoriert.
          
          ---
          
          ### Schonladung Faktor (0.05–1.0)
          
          **Wirkung:** Multiplikator auf die konfigurierte Max-Ladeleistung.
          
          Beispiel: Max-Ladeleistung = 5 000 W, Faktor = 0.35 → max. 1 750 W.
          
          **Empfehlung:** 0.25–0.50 für sanften Betrieb. 1.0 deaktiviert die Drosselung
          effektiv (Schalter bleibt bestimmend).
          
          **Standard:** 0.35 (≈ C/5–C/6 für typische Heimakkus)
          
          ---

  - title: "Hilfe: Auto-Optimierung"
    path: help-auto
    subview: true
    cards:
      - type: markdown
        content: |
          ## Auto-Optimierung

          Maestro evaluiert einmal täglich (kurz nach Mitternacht) automatisch
          mehrere hundert Parameter-Kombinationen für **Morning-Cap** und
          **Schonladung** mit dem internen 24-h-Forecast-Simulator als
          Bewertungsfunktion und wählt die Kombination, die das gewählte Ziel
          maximiert.

          Manuelle Eingaben (Switches / Number-Entities) **überschreiben das
          Auto-Override sofort** – der Nutzer gewinnt immer.

          ---

          ### Wie wird bewertet?

          Der Simulator rechnet in **15-Minuten-Schritten** das Verhalten der
          nächsten 24 h durch — und **48 h, wenn ein Solcast/Forecast.Solar-Sensor
          auch die Tag-2-Prognose liefert**:

          1. **PV-Prognose** aus `forecast.solar`-Sensor oder Astro-Modus.
             Bei 48 h-Horizont wird Tag 1 + Tag 2 stundenweise gerechnet.
          2. **Hauslast-Prognose** aus den letzten 7 Tagen (kWh/Tag-Mittel).
          3. **Akku-Simulation** mit den aktuellen Hardware-Parametern
             (Kapazität, Wirkungsgrad, Lade-/Entladegrenzen).
          4. **Strategie** mit den getesteten Parametern (Morning-Cap-SoC,
             -bis-Uhrzeit, Schonladung-Faktor).

          Ergebnis je Kombination: prognostizierter Netzbezug, Einspeisung,
          Eigenverbrauch, Curtailment-Verlust und – beim Ziel `cost` – die
          €-Bilanz unter Berücksichtigung deiner Tarifeinstellungen.

          **Warum 48 h-Horizont?** Bei reinem 24-h-Blick wirkt ein niedriger
          End-SoC abends „kostenlos" (mehr Einspeisung). Mit Tag-2-Forecast
          erkennt der Optimizer, ob das am Folgetag teuren Netzbezug
          verursacht (bewölkter Morgen) — und wählt dann automatisch eine
          schonendere Strategie.

          **Wie aktivieren?** In den Maestro-Optionen unter
          *PV-Prognose* das Feld **„Prognose morgen (Stundenprofil)"** oder den
          Morgen-Sensor auf einen Solcast-Sensor mit `detailedHourly` für
          **morgen** setzen (z. B. `sensor.solcast_pv_forecast_prognose_morgen`).
          Erst dann läuft der Optimizer mit 48 h-Horizont — keine
          Auto-Erkennung, um Überraschungen zu vermeiden.

          ---

          ### Optimierungsziele

          - **`self_consumption`** (Eigenverbrauch maximieren) — **Standard.**
            Score = `Autarkie · 100 − 0,5 · Netzbezug − 1,5 · Curtailment`.
            Kombiniert Eigenverbrauchsgrad mit Strafe für PV-Abregelung.
          - **`cost`** (€-Bilanz maximieren).
            Score = `−(Bezug · Kaufpreis − Einspeisung · Verkaufspreis)
            − Curtailment · Verkaufspreis − Akku-Verschleiß`.
            **Preise stammen aus deinen Tarif-Einstellungen** — fixer Tarif
            oder Mittelwert des dynamischen Preissensors. Akku-Verschleiß
            wird aus Kapazität, Capex und Total-Cycles berechnet (siehe
            → Hardware bzw. → Kostenmodul).
          - **`co2`** (CO₂ minimieren).
            Score = `−(Netzbezug + Curtailment) · 0,4 kg/kWh`
            (deutscher Strommix-Durchschnitt).

          ---

          ### Suchraum (Grid-Search)

          | Parameter              | Werte                                  |
          |------------------------|----------------------------------------|
          | Morning-Cap SoC        | 20 / 30 / 40 / 50 / 60 / 70 / 80 %     |
          | Morning-Cap bis (lokal)| 7 / 8 / 9 / 10 / 11 / 12 h             |

          → **bis zu 42 Kombinationen** pro Tag (7 × 6; Attribut `grid_size`).
          Cap-Werte unter der aktiven Reserve werden übersprungen — dann ist
          `grid_size` kleiner.

          Höhere Cap-SoC + spätere Until-Stunde halten den Akku im Sommer
          länger leer und verhindern Mittags-Curtailment auf hohen PV-Tagen.

          ---

          ### Sicherheitsbedingungen

          - Auto-Override wird **nicht** angewendet, wenn die simulierte
            minimale SoC-Trajektorie unter `adaptive_reserve_min_soc`
            (mindestens 5 %) fallen würde.
          - Bei < 7 Tagen Verbrauchs- oder PV-Historie greift der Fallback
            (= manueller Modus).
          - Bringt der beste Kandidat keinen messbaren Vorteil gegenüber
            der Basis-Konfiguration → ebenfalls Fallback.
          - Override gilt **nur für den heutigen Tag**. Am nächsten
            Mitternacht läuft die Optimierung erneut.

          ---

          ### Status-Sensor

          `sensor.e3dc_maestro_auto_aktive_strategie` zeigt:

          - **`manuell`** — Auto deaktiviert.
          - **`manuell (Fallback)`** — Auto aktiv, aber kein gültiges Override
            (zu wenig Daten / Sicherheit / kein besserer Score).
          - **`auto`** — Override aktiv, Morning-Cap-Parameter werden
            überschrieben.

          Attribute des Sensors:

          | Attribut | Bedeutung |
          |---|---|
          | `objective` | Aktuell gewähltes Ziel |
          | `last_run` | Zeitpunkt der letzten Optimierung |
          | `fallback_reason` | Grund, falls Fallback aktiv |
          | `overrides` | Welche Parameter überschrieben sind und mit welchen Werten |
          | `grid_size` | Anzahl ausgewerteter Kombinationen (≤ 42) |
          | `estimated_savings_pct` | Geschätzter Vorteil ggü. Basis (in %) |

          ---

          ### Verknüpfung mit dem Kostenmodul

          Das `cost`-Ziel benutzt **dieselben Tarifeinstellungen** wie die
          €-Sensoren der Kachel „💶 Erträge & Kosten heute". Wer den
          Auto-Optimierer auf `cost` stellt, optimiert also direkt auf das,
          was der Sensor `Energiebilanz heute` über den Tag hochzählt –
          siehe [→ Kostenmodul](/e3dc-maestro-modern/help-kostenmodul) für die
          genauen Formeln.

          ---

  - title: "Hilfe: Kostenmodul"
    path: help-kostenmodul
    subview: true
    cards:
      - type: markdown
        content: |
          ## Kostenmodul – Erträge, Kosten & Bilanz

          Maestro berechnet aus den live gemessenen Leistungen (Netz, PV,
          Akku, Haus) und deinen Tarifeinstellungen eine **vollständige
          €-Bilanz pro Tag**. Alle Werte werden alle 5 Sekunden
          aktualisiert, per HA-Storage **persistiert** (überleben Neustarts)
          und um Mitternacht auf 0 zurückgesetzt.

          Über `state_class: total_increasing` + `device_class: monetary`
          erzeugt Home Assistant automatisch Langzeitstatistiken — damit
          funktionieren auch **Wochen-, Monats- und Jahressummen** über das
          Energy-Dashboard, `statistics-graph`-Karten oder Verbrauchszähler-
          Helfer (Utility Meter).

          ---

          ### Sensoren der Kachel „💶 Erträge & Kosten heute"

          | Sensor | Formel (kontinuierliche Integration über die Zeit) |
          |---|---|
          | **PV-Eigenverbrauch** (kWh) | ∫ `max(0, PV − Einspeisung) dt` — direkt verbrauchte oder in den Akku geladene PV-Energie |
          | **PV-Ersparnis** (€) | ∫ `max(0, Haus − Netzbezug) · Kaufpreis dt` — Wert der Energie, die ohne PV/Akku aus dem Netz hätte gekauft werden müssen. Deckt sowohl `PV → Haus` als auch `Akku → Haus` ab. |
          | **Einspeise-Erlös** (€) | ∫ `Einspeisung · Einspeisepreis dt` |
          | **Netzbezugskosten** (€) | ∫ `Netzbezug · Kaufpreis dt` |
          | **Netto-Stromkosten** (€) | `Netzbezugskosten − Einspeise-Erlös` (kann negativ werden = Tagesüberschuss) |
          | **Akku-Verschleiß** (€) | ∫ `Akku-Durchsatz · €/kWh-Verschleiß dt` |
          | **Energiebilanz** (€) | `Einspeise-Erlös + PV-Ersparnis − Netzbezugskosten − Akku-Verschleiß` |

          *Integration:* Maestro multipliziert die aktuelle Leistung in
          Watt mit dem Update-Intervall (5 s ≈ 0,00139 h) und summiert. Die
          Tageswerte sind dadurch **monoton steigend** und Energy-Dashboard-
          kompatibel.

          ---

          ### Welcher Strompreis wird verwendet?

          | Tarif-Modus | Kaufpreis (Bezug) | Einspeisepreis |
          |---|---|---|
          | **Fixed** (Standard) | aus *Einstellungen → Fixer Strompreis* | aus *Einspeisevergütung* |
          | **Dynamic** | **Live-Wert** des verknüpften Preissensors (Tibber, aWATTar, …) | aus *Einspeisevergütung* (Festwert) |

          Bei dynamischem Tarif wird **in jedem 5-s-Zyklus der aktuelle
          Spotpreis** aus dem Preissensor gelesen und auf den in dieser
          Sekunde bezogenen Strom angewendet. Stundengrenzen und schnelle
          Preiswechsel werden korrekt erfasst (kein 1/h-Snapshotting).

          ---

          ### Akku-Verschleißkosten

          Berechnet aus deinen Hardware-Parametern (Tab Einstellungen →
          Hardware):

          ```
          €/kWh-Durchsatz = Capex / (Total-Cycles × 2 × Kapazität)
          ```

          Beispiel: 8000 € / (5000 × 2 × 11 kWh) ≈ **0,073 €/kWh**.
          Dieser Wert wird auf den **Akku-Durchsatz** (geladene + entladene
          Energie) gerechnet und liefert eine realistische Untergrenze für
          den Wirtschaftlichkeitsvergleich von Strategien.

          ---

          ### Wichtige Eigenschaften

          - **Persistenz:** Werte werden in `.storage/e3dc_maestro_stats_*`
            gesichert und nach einem HA-Neustart **wiederhergestellt**
            (sofern noch derselbe Tag).
          - **Mitternachts-Reset:** Punkt 00:00 lokaler Zeit werden alle
            `*_heute`-Werte auf 0 gesetzt. HA's Statistik-Datenbank
            archiviert die Tageswerte vorher → Long-Term-Aggregation
            bleibt erhalten.
          - **Kein Backfill:** Nach Installation/Reset werden Vergangenheits-
            Tage **nicht** rekonstruiert. Sinnvolle Wochenwerte erscheinen
            erst nach 7 vollen Tagen.
          - **Wochen-/Monats-/Jahreswerte:** trag die Sensoren `Netzbezug
            heute`, `Netzeinspeisung heute`, `Stromkosten heute` und
            `Einspeise-Erlös heute` ins HA-Energy-Dashboard ein —
            Tag/Woche/Monat/Jahr werden automatisch berechnet. Für eigene
            Karten kannst du Verbrauchszähler-Helfer mit Reset-Zyklen
            `daily/weekly/monthly/yearly` anlegen.

          ---

          ### Verknüpfung mit dem Auto-Optimierer

          Stelle das Optimierungsziel auf **`cost`**, dann verwendet der
          Auto-Optimierer **dieselben Preise wie diese Sensoren** und
          maximiert direkt die `Energiebilanz heute`.
          Siehe [→ Auto-Optimierung](/e3dc-maestro-modern/help-auto).

          ---

  - title: Hilfe Sizing Advisor
    path: help-sizing-advisor
    subview: true
    cards:
      - type: markdown
        content: |
          ## Akku & PV Sizing Advisor

          Der Sizing Advisor simuliert auf Basis deiner historischen Verbrauchsdaten,
          wie viel Netzbezug du durch eine zusätzliche Batterie oder PV-Erweiterung
          einsparen könntest.

          ---

          ### Wie funktioniert die Simulation?

          Maestro lädt die stündlichen Energiewerte der letzten N Tage (konfigurierbar
          in den Optionen) und repliziert jede Stunde mit einem virtuellen Akku und
          skalierter PV-Leistung. Für jede Kombination aus Batteriegröße und
          PV-Erweiterung wird berechnet:
          - Wie viel Netzbezug entfällt?
          - Wie hoch ist die jährliche Ersparnis?
          - Wäre ein Wechselrichter-Upgrade nötig?

          Das Ergebnis ist eine 2D-Matrix (Akku × PV), aus der drei Empfehlungen
          abgeleitet werden.

          ---

          ### Szenario-Slider

          Mit den Schiebereglern kannst du beliebige Punkte auf der Matrix interpolieren.
          Die Werte für Autarkie, Ersparnis und Amortisation werden **sofort** neu
          berechnet – ohne die Analyse erneut zu starten.

          ---

          ### Investitionskosten

          Die vier Preisfelder (**Akku €/kWh**, **PV €/kWp**, **WR-Upgrade €**,
          **Zusatzkosten €**) beeinflussen die Investitions- und Amortisationsberechnung
          direkt. Ändere einen Wert → alle KPI-Karten rechnen sofort neu.

          **WR-Upgrade** wird automatisch eingerechnet, wenn die PV-Erweiterung
          die Wechselrichter-Nennleistung übersteigt.

          ---

          ### Empfehlungen

          | Empfehlung | Kriterium |
          |---|---|
          | 💰 Wirtschaftlich | Bestes Verhältnis Ersparnis/Investition (kürzeste Amortisation) |
          | 🔋 Technisch | Höchste Autarkie im gesamten Sweep-Bereich |
          | ⚖️ Ausgewogen | Gewichtetes Scoring aus Autarkie + Amortisationszeit |

          ---

          ### Sweep-Grenzen anpassen

          Unter **Einstellungen → Integrationen → E3DC Maestro → Optionen** kannst du
          den maximalen Sweep-Bereich (Standard: 100 kWh / 100 kWp) und die
          Schrittweite anpassen. Nach jeder Änderung **Analyse starten** drücken,
          damit die Matrix neu berechnet wird.

          ---

          ### Hinweise

          - Die Simulation basiert auf vergangenen Daten – zukünftiger Verbrauch
            und Wetterbedingungen können abweichen.
          - Sehr kleine Schrittweiten (z. B. 0,5 kWh) bei großem Sweep-Bereich
            können die Analyse mehrere Minuten dauern lassen.
          - Die Matrix wird lokal gespeichert und übersteht HA-Neustarts.

